  pcie_peak_gbps: 64.0
  achievable_gbps: 340.0
  source_url: "https://www.amd.com/en/products/accelerators/instinct/mi300/mi300x.html"
  measured_with: "vendor datasheet (CDNA3) + RCCL AllReduce, 8-GPU ring"

gfx950:
