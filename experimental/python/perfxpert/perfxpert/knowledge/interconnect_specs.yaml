  pcie_peak_gbps: 64.0
  achievable_gbps: 650.0
  source_url: "https://www.amd.com/en/products/accelerators/instinct/mi350.html"
  measured_with: "vendor datasheet (CDNA4)"

gfx1030:
  name: "RX 6900 XT"
  xgmi_peak_gbps: 0.0           # consumer RDNA2 has no XGMI
  xgmi_links: 0
