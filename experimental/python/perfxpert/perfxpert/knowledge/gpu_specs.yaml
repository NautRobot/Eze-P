  peak_fp16_tflops: 184.6
  peak_bf16_tflops: 92.3
  peak_fp8_tflops: 0.0        # no FP8 MFMA on CDNA1
  peak_int8_tops: 184.6
  memory_bandwidth_tbs: 1.2
  cu_count: 120
  lds_kb: 64
  lds_per_cu_kb: 64
  wave_size: 64
  max_vgprs_per_thread: 256
  vgprs_per_simd: 512
