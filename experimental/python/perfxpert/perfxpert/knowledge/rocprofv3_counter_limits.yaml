# rocprofv3-specific counter collection rules and isolation requirements.
# These tool-runtime rules avoid rocprofv3 collection failures; they are not
# GPU peak specifications.
# Source: projects/rocprofiler-compute/src/utils/mi_gpu_spec.yaml
#         perfmon_config entries and perfxpert/knowledge/pmc_limits.yaml.
#
# These rules encode the behavior enforced by analyze.py:_split_pmc_into_passes()
# and source_analyzer.py:_pmc_commands().

isolation_rules:
  - rule: "FETCH_SIZE requires its own dedicated pass"
    counters: ["FETCH_SIZE"]
    reason: "FETCH_SIZE expands to 3 hardware counters (TCC_BUBBLE + TCC_EA0_RDREQ + GRBM_GUI_ACTIVE); keep it isolated so it cannot combine with WRITE_SIZE or other TCC counters near the TCC per-pass limit 4."
    severity: error

  - rule: "WRITE_SIZE requires its own dedicated pass"
    counters: ["WRITE_SIZE"]
    reason: "WRITE_SIZE expands to 2 TCC hardware counters (TCC_EA0_WRREQ + TCC_EA0_WRREQ_64B); keep it isolated so it cannot combine with FETCH_SIZE or other TCC counters near the TCC per-pass limit 4."
    severity: error

  - rule: "FETCH_SIZE and WRITE_SIZE MUST NOT share a pass"
    counters: ["FETCH_SIZE", "WRITE_SIZE"]
    reason: "Together they expand to 5 derived hardware counter slots near the source-derived TCC per-pass limit 4, so each derived metric owns a separate pass."
    severity: error

  - rule: "FETCH_SIZE/WRITE_SIZE MUST NOT share a pass with any SQ counter"
    counters: ["FETCH_SIZE", "WRITE_SIZE"]
    reason: "Derived TCC counters remain isolated from SQ counters so pass planning stays within per-block PMC limits across supported GPU families."
    severity: error

error_codes:
  "38":
    message: "Request exceeds the capabilities of the hardware to collect"
    remedy: "Split counter list into multiple passes, ensuring per-block limits and TCC-derived isolation rules are satisfied"
