PACKAGE_NAME="perf-pmu-stub"
PACKAGE_VERSION="1.0.0"

# Module configuration
BUILT_MODULE_NAME[0]="amdgpu_pmu"
BUILT_MODULE_LOCATION[0]="build/src/"
DEST_MODULE_LOCATION[0]="/kernel/drivers/perf/"

# Build and clean commands
MAKE[0]="cmake -B build -DBUILD_KERNEL_MODULE=ON -DBUILD_USERSPACE_TOOLS=OFF -DBUILD_TESTS=OFF && cmake --build build --target kernel_module"
CLEAN="rm -rf build"

# Auto-install on kernel upgrade
AUTOINSTALL="yes"

# Don't strip debug symbols for development
STRIP[0]="no"