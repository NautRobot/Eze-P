[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "amdisa"
version = "0.1.0"
description = "AMD machine-readable ISA specification parser and C++ code generator."
requires-python = ">=3.10"
license = "MIT"
dependencies = ["cgen"]

[tool.setuptools.packages.find]
include = ["amdisa*"]
