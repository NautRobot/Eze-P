# Goal: consolidate into a single root .pre-commit-config.yaml for all
# projects in rocm-systems. This per-project config is a stepping stone.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black
        args: ["--skip-string-normalization"]

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.4
    hooks:
      - id: clang-format
        name: clang-format (C/C++/ObjC)
        entry: clang-format -i -style=file
        files: '\.(c|cpp|cc|h|hpp|m|mm)$'

  - repo: https://github.com/BlankSpruce/gersemi
    rev: 0.22.1
    hooks:
      - id: gersemi
