[build-system]
requires = [
    "setuptools>=40.8.0",
    "wheel",
    "cmake>=3.20,<4.0",
    "pybind11>=2.13.1",
]
build-backend = "setuptools.build_meta"

[project]
name = "rocshmem4py"
version = "0.1.0"
description = "Python bindings for ROCm OpenSHMEM (rocSHMEM) runtime library"
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
authors = [
    {name = "Advanced Micro Devices, Inc."}
]
keywords = ["rocm", "hip", "rocshmem", "pgas", "hpc", "distributed"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: C++",
    "Topic :: Scientific/Engineering",
    "Topic :: Software Development :: Libraries",
    "Topic :: System :: Distributed Computing",
]

[project.urls]
Homepage = "https://github.com/ROCm/rocm-systems"
Repository = "https://github.com/ROCm/rocm-systems"
"Bug Tracker" = "https://github.com/ROCm/rocm-systems/issues"

[project.optional-dependencies]
test = ["pytest>=6.0", "mpi4py>=3.0"]
mpi = ["mpi4py>=3.0"]

[tool.setuptools.packages.find]
include = ["rocshmem4py*"]

[tool.pytest.ini_options]
minversion = "6.0"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]

[tool.ruff]
line-length = 120

[tool.ruff.lint]
ignore = ["E501", "E731"]
