# Rocrtst test categories for CI
# Filled from execution-time analysis; GTest names match a typical rocrtst gtest run.
# If a test is renamed, update both the binary and this file.
#
# Tiers
#   quick:          smoke / pre-commit (<~5 min target; dominated by a few long tests in practice)
#   standard:       every-PR (quick + more functional; ~<30 min target)
#   comprehensive:  nightly (standard + long functional, stress, and heavy rocrtstPerf; ~<2 h)
#   full:           as exhaustive as this repo runs in CI; still excludes rocrtstFunc.Memory_Max_Mem
#                   and gfx950 coredump patterns via exclude* below.

test_categories:
  quick:
    description: "Fast sanity checks - Run pre-commit (target: < 5 min)"
    test_patterns:
      - "rocrtst.Test_Example"
      - "rocrtstFunc.MemoryAccessTests"
      - "rocrtstFunc.GroupMemoryAllocationTest"
      - "rocrtstFunc.MemoryAllocateAndFreeTest"
      - "rocrtstFunc.Memory_Alignment_Test"
      - "rocrtstFunc.Concurrent_Init_Test"
      - "rocrtstFunc.Concurrent_Init_Shutdown_Test"
      - "rocrtstFunc.Reference_Count"
      - "rocrtstFunc.Signal_Create_Concurrently"
      - "rocrtstFunc.Signal_Destroy_Concurrently"
      - "rocrtstFunc.IPC"
      - "rocrtstFunc.Deallocation_Notifier_Test"
      - "rocrtstFunc.Memory_Atomic_Add_Test"
      - "rocrtstFunc.Memory_Atomic_Xchg_Test"
      - "rocrtstFunc.MemoryFillTest"
      - "rocrtstFunc.AgentProp_UUID"
      - "rocrtstFunc.AgentPropertiesTests"
    exclude:
      - "rocrtstFunc.Memory_Max_Mem"
    exclude_windows: []
    exclude_linux: []
    labels:
      - "quick"
      - "pre-commit"
      - "smoke"

  standard:
    description: "Core functionality - Run on every PR (target: < 30 min)"
    test_patterns:
