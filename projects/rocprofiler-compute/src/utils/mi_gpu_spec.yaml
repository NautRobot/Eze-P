# --------------------------------------------------------------------------------
#
# This yaml file tracks GPU spec in a tree structure.
#
# *It is important to note that this file only tracks the common specs for GPU series.*
# *For example, the CU #s are based on information retrieved from other tools.*
#
#
# GPUs
#   |-- series: the specific series; mi50, mi100, mi200, mi300
#       |-- architecture: currently, only mi300 gpus hold different architectures
#           |-- perfmon_config, copy from ROCm/aqlprofile from gfxip/gfx9/gfx9_block_info.h
#           |-- gpu model
#           |-- chip_ids: chip id is specific to the environment the gpu is being used on
#               | -- physical
#               | -- virtual # The pattern is physical + 16
#           |-- partition_mode:
#               | -- compute partition mode:
#                   | -- num_xcds # Number of XCDs per partition
#               | -- memory partition mode:
#                   | -- npsX: # NUMA partition per socket
#                       | -- Xpx # Number of HBM stack partitions
#           |-- design:
#               | -- physical_aid # Number of physical AIDs (CDNA)
#               | -- logical_partitions_per_die # Logical AID partitions per physical AID (CDNA)
#               | -- memory_levels # Cache and memory levels supported by the arch
#
# --------------------------------------------------------------------------------

mi_gpu_spec:
  - gpu_series: mi100
    gpu_archs:
      - gpu_arch: gfx908
        perfmon_config:
          SQ: 8
          TA: 2
          TD: 2
          TCP: 4
          TCC: 4
          CPC: 2
          CPF: 2
          SPI: 6
          GRBM: 2
          GDS: 4
        models:
          - gpu_model: mi100
            chip_ids:
              physical: 29580

