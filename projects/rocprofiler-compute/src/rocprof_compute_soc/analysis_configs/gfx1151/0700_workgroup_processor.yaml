# =============================================================================
# RDNA3.5 (gfx1151) - RDNA3.5 Workgroup Processor (WGP) Performance Metrics
# =============================================================================
# RDNA3.5 WGP Structure: 2 CUs per WGP, 2 SIMD32 per CU, Wave32 primary wavefront size
# =============================================================================

Panel Config:
  id: 700
  title: Workgroup Processor (WGP)
  data source:
  # =========================================================================
  # Utilization Metrics
  # =========================================================================
  - metric_table:
      id: 701
      title: "Utilization"
      header:
        metric: Metric
        avg: Avg
        min: Min
        max: Max
        unit: Unit
      metric:
        WGP Utilization:
          avg: None
          min: None
          max: None
          unit: Percent

  - metric_table:
      id: 702
      title: Wavefront Launch Stats
      header:
        metric: Metric
        avg: Avg
        min: Min
        max: Max
        unit: Unit
      metric:
        Grid Size:
          avg: AVG(Grid_Size)
          min: MIN(Grid_Size)
          max: MAX(Grid_Size)
          unit: Work-items
        Workgroup Size:
          avg: AVG(Workgroup_Size)
          min: MIN(Workgroup_Size)
          max: MAX(Workgroup_Size)
          unit: Work-items
        VGPRs:
          avg: AVG(Arch_VGPR)
          min: MIN(Arch_VGPR)
          max: MAX(Arch_VGPR)
          unit: Registers
        SGPRs:
          avg: AVG(SGPR)
          min: MIN(SGPR)
          max: MAX(SGPR)
          unit: Registers
        LDS Allocation:
          avg: AVG(LDS_Per_Workgroup)
          min: MIN(LDS_Per_Workgroup)
          max: MAX(LDS_Per_Workgroup)
          unit: Bytes
        Scratch Allocation:
          avg: AVG(Scratch_Per_Workitem)
          min: MIN(Scratch_Per_Workitem)
          max: MAX(Scratch_Per_Workitem)
          unit: Bytes per Work-item

  # =========================================================================
  # Wave Dispatch
  # =========================================================================
  - metric_table:
      id: 703
      title: "Wave Dispatch"
      header:
        metric: Metric
        avg: Avg
        min: Min
        max: Max
        unit: Unit
      metric:
        Dispatched Waves:
          avg: AVG(SQ_WAVES_sum)
          min: MIN(SQ_WAVES_sum)
          max: MAX(SQ_WAVES_sum)
          unit: Waves
        Dispatched Threads:
          avg: AVG(SQ_ITEMS_sum)
          min: MIN(SQ_ITEMS_sum)
          max: MAX(SQ_ITEMS_sum)
          unit: Threads

  # =========================================================================
  # Wave Life
  # =========================================================================
  - metric_table:
      id: 704
      title: "Wave Life"
      header:
        metric: Metric
        avg: Avg
        min: Min
        max: Max
        unit: Unit
      metric:
        Wave Life:
          avg: SUM(SQ_WAVE_CYCLES_sum) / SUM(SQ_WAVES_sum)
          min: MIN(SQ_WAVE_CYCLES_sum / SQ_WAVES_sum)
          max: MAX(SQ_WAVE_CYCLES_sum / SQ_WAVES_sum)
          unit: Cycles

  # =========================================================================
  # Wave Instruction Mix
  # =========================================================================
  - metric_table:
      id: 705
      title: "Wave Instruction Mix"
      header:
        metric: Metric
        avg: Avg
        min: Min
        max: Max
        unit: Unit
      metric:
        Total Instructions:
          avg: SUM(SQ_INSTS_ALL_sum) / SUM($denom)
          min: MIN(SQ_INSTS_ALL_sum / $denom)
          max: MAX(SQ_INSTS_ALL_sum / $denom)
          unit: (Count + $normUnit)
        Instructions - Internal:
          avg: SUM(SQ_INSTS_INTERNAL_sum) / SUM($denom)
          min: MIN(SQ_INSTS_INTERNAL_sum / $denom)
          max: MAX(SQ_INSTS_INTERNAL_sum / $denom)
          unit: (Count + $normUnit)
        Instructions - VALU:
          avg: SUM(SQ_INSTS_VALU_sum) / SUM($denom)
          min: MIN(SQ_INSTS_VALU_sum / $denom)
          max: MAX(SQ_INSTS_VALU_sum / $denom)
          unit: (Count + $normUnit)
        Instructions - SALU:
          avg: SUM(SQ_INSTS_SALU_sum) / SUM($denom)
          min: MIN(SQ_INSTS_SALU_sum / $denom)
          max: MAX(SQ_INSTS_SALU_sum / $denom)
          unit: (Count + $normUnit)
        Instructions - SMEM:
          avg: SUM(SQ_INSTS_SMEM_sum) / SUM($denom)
          min: MIN(SQ_INSTS_SMEM_sum / $denom)
          max: MAX(SQ_INSTS_SMEM_sum / $denom)
          unit: (Count + $normUnit)
        Instructions - Transcendental:
          avg: SUM(SQ_INSTS_VALU_TRANS_sum) / SUM($denom)
          min: MIN(SQ_INSTS_VALU_TRANS_sum / $denom)
          max: MAX(SQ_INSTS_VALU_TRANS_sum / $denom)
          unit: (Count + $normUnit)
        # Instructions - Dual VALU (VOPD): row omitted (sq_insts_dual_valu_wave32 unreliable). When
        # restoring, uncomment below, switch to SUM(sq_insts_dual_valu_wave32_sum)/… per sdk_config,
        # and sync tools/per_arch_metric_definitions/gfx1151_metrics_description.yaml,
        # docs/data/metrics/gfx1151_metrics.yaml, and SoL prose if needed. Lowercase tokens in the
        # snippet avoid PMC expansion if pasted verbatim; replace with SQ_* before enabling.
        #   avg: SUM(sq_insts_dual_valu_wave32_sum) / SUM($denom)
        #   min: MIN(sq_insts_dual_valu_wave32_sum / $denom)
        #   max: MAX(sq_insts_dual_valu_wave32_sum / $denom)
        #   unit: (Count + $normUnit)
        Instructions - VMEM:
          avg: SUM(SQ_INSTS_TEX_sum) / SUM($denom)
          min: MIN(SQ_INSTS_TEX_sum / $denom)
          max: MAX(SQ_INSTS_TEX_sum / $denom)
          unit: (Count + $normUnit)
        Instructions - LDS:
          avg: SUM(SQ_INSTS_LDS_sum) / SUM($denom)
          min: MIN(SQ_INSTS_LDS_sum / $denom)
          max: MAX(SQ_INSTS_LDS_sum / $denom)
          unit: (Count + $normUnit)

  # =========================================================================
  # VMEM Instruction Mix
  # =========================================================================
  - metric_table:
      id: 706
      title: "VMEM Instruction Mix"
      header:
        metric: Metric
        avg: Avg
        min: Min
        max: Max
        unit: Unit
      metric:
        Instructions - VMEM Flat:
          avg: SUM(SQ_INSTS_FLAT_sum) / SUM($denom)
          min: MIN(SQ_INSTS_FLAT_sum / $denom)
          max: MAX(SQ_INSTS_FLAT_sum / $denom)
          unit: (Count + $normUnit)
        Instructions - TEX Load:
          avg: SUM(SQ_INSTS_TEX_LOAD_sum) / SUM($denom)
          min: MIN(SQ_INSTS_TEX_LOAD_sum / $denom)
          max: MAX(SQ_INSTS_TEX_LOAD_sum / $denom)
          unit: (Count + $normUnit)
        Instructions - TEX Store:
          avg: SUM(SQ_INSTS_TEX_STORE_sum) / SUM($denom)
          min: MIN(SQ_INSTS_TEX_STORE_sum / $denom)
          max: MAX(SQ_INSTS_TEX_STORE_sum / $denom)
          unit: (Count + $normUnit)
        Instructions - Flat Load:
          avg: SUM(SQ_INSTS_FLAT_LOAD_sum) / SUM($denom)
          min: MIN(SQ_INSTS_FLAT_LOAD_sum / $denom)
          max: MAX(SQ_INSTS_FLAT_LOAD_sum / $denom)
          unit: (Count + $normUnit)
        Instructions - Flat Store:
          avg: SUM(SQ_INSTS_FLAT_STORE_sum) / SUM($denom)
          min: MIN(SQ_INSTS_FLAT_STORE_sum / $denom)
          max: MAX(SQ_INSTS_FLAT_STORE_sum / $denom)
          unit: (Count + $normUnit)

  # =========================================================================
  # LDS Instruction Mix (breakdown; total LDS = "Instructions - LDS" in Wave Mix)
  # =========================================================================
  - metric_table:
      id: 707
      title: "LDS Instruction Mix"
      header:
        metric: Metric
        avg: Avg
        min: Min
        max: Max
        unit: Unit
      metric:
        LDS Direct Load Instructions:
          avg: SUM(SQ_INSTS_LDS_DIRECT_LOAD_sum) / SUM($denom)
          min: MIN(SQ_INSTS_LDS_DIRECT_LOAD_sum / $denom)
          max: MAX(SQ_INSTS_LDS_DIRECT_LOAD_sum / $denom)
          unit: (Count + $normUnit)
        LDS Parameter Load Instructions:
          avg: SUM(SQ_INSTS_LDS_PARAM_LOAD_sum) / SUM($denom)
          min: MIN(SQ_INSTS_LDS_PARAM_LOAD_sum / $denom)
          max: MAX(SQ_INSTS_LDS_PARAM_LOAD_sum / $denom)
          unit: (Count + $normUnit)
        WAVE32 LDS Parameter Load Instructions:
          avg: SUM(SQ_INSTS_WAVE32_LDS_PARAM_LOAD_sum) / SUM($denom)
          min: MIN(SQ_INSTS_WAVE32_LDS_PARAM_LOAD_sum / $denom)
          max: MAX(SQ_INSTS_WAVE32_LDS_PARAM_LOAD_sum / $denom)
          unit: (Count + $normUnit)

  # =========================================================================
  # Wait State Analysis
  # =========================================================================
  - metric_table:
      id: 709
      title: "Wait State Analysis"
      header:
        metric: Metric
        avg: Avg
        min: Min
        max: Max
        unit: Unit
      metric:
        Wait for Any:
          avg: SUM(100 * SQ_WAIT_ANY) / SUM(SQ_WAVE_CYCLES)
          min: MIN(100 * SQ_WAIT_ANY / SQ_WAVE_CYCLES)
          max: MAX(100 * SQ_WAIT_ANY / SQ_WAVE_CYCLES)
          unit: Percent
        Wait for Instruction Fetch:
          avg: SUM(100 * SQ_WAIT_IFETCH) / SUM(SQ_WAVE_CYCLES)
          min: MIN(100 * SQ_WAIT_IFETCH / SQ_WAVE_CYCLES)
          max: MAX(100 * SQ_WAIT_IFETCH / SQ_WAVE_CYCLES)
          unit: Percent
        Wait for Barrier:
          avg: SUM(100 * SQ_WAIT_BARRIER) / SUM(SQ_WAVE_CYCLES)
          min: MIN(100 * SQ_WAIT_BARRIER / SQ_WAVE_CYCLES)
          max: MAX(100 * SQ_WAIT_BARRIER / SQ_WAVE_CYCLES)
          unit: Percent
        Wait for Counter:
          avg: SUM(100 * SQ_WAIT_CNT_ANY) / SUM(SQ_WAVE_CYCLES)
          min: MIN(100 * SQ_WAIT_CNT_ANY / SQ_WAVE_CYCLES)
          max: MAX(100 * SQ_WAIT_CNT_ANY / SQ_WAVE_CYCLES)
          unit: Percent

  # =========================================================================
  # Instruction Cache
  # =========================================================================
  - metric_table:
      id: 710
      title: "Instruction Cache"
      header:
        metric: Metric
        avg: Avg
        min: Min
        max: Max
        unit: Unit
      metric:
        # HITS and REQ are per-SQ per-bank; summed HITS can exceed REQ → >100%. Use HITS+MISSES
        # as the outcome denominator (same pairing as Memory Chart / SoL).
        Icache Hit Rate:
          avg: SUM(100 * SQC_ICACHE_HITS_sum) / SUM(SQC_ICACHE_HITS_sum + SQC_ICACHE_MISSES_sum)
          min: MIN(100 * SQC_ICACHE_HITS_sum / (SQC_ICACHE_HITS_sum + SQC_ICACHE_MISSES_sum))
          max: MAX(100 * SQC_ICACHE_HITS_sum / (SQC_ICACHE_HITS_sum + SQC_ICACHE_MISSES_sum))
          unit: Percent

  # =========================================================================
  # Scalar Data Cache
  # =========================================================================
  - metric_table:
      id: 711
      title: "Scalar Data Cache"
      header:
        metric: Metric
        avg: Avg
        min: Min
        max: Max
        unit: Unit
      metric:
        Dcache Hit Rate:
          avg: SUM(100 * SQC_DCACHE_HITS_sum) / SUM(SQC_DCACHE_HITS_sum + SQC_DCACHE_MISSES_sum)
          min: MIN(100 * SQC_DCACHE_HITS_sum / (SQC_DCACHE_HITS_sum + SQC_DCACHE_MISSES_sum))
          max: MAX(100 * SQC_DCACHE_HITS_sum / (SQC_DCACHE_HITS_sum + SQC_DCACHE_MISSES_sum))
          unit: Percent

  metrics_description:
    WGP Utilization: >-
      Percentage of GPU active cycles where the Workgroup Processor is busy executing
      wavefronts. RDNA 3.5 WGPs contain two compute units, each with dual SIMD32 units.
      Low utilization may indicate insufficient parallelism or resource bottlenecks.
    Wave Life: >-
      Average number of cycles from wavefront creation to completion. Longer wave life
      indicates more execution time per wavefront, which may be due to complex kernels,
      memory latency, or synchronization waits.
    Total Instructions: >-
      Total number of instructions executed across all wavefronts. This provides an
      overall measure of computational work. Compare with specific instruction types
      to understand the workload characteristics.
    Instructions - Internal: >-
      Internal SQ instructions (SQ_INSTS_INTERNAL) per normalization unit. These
      represent bookkeeping or non-user-visible work issued by the SQ.
    Instructions - VALU: >-
      Number of Vector ALU instructions executed. VALU handles arithmetic and logic
      operations across all work-items in a wavefront. High VALU counts indicate
      compute-intensive kernels.
    Instructions - SALU: >-
      Number of Scalar ALU instructions executed. SALU handles operations with uniform
      values across the wavefront. Efficient kernels often have a balance of VALU and
      SALU operations.
    Instructions - SMEM: >-
      Number of scalar memory instructions executed. SMEM loads constant and uniform
      data through the scalar cache. High counts may indicate heavy use of constant
      buffers or kernel arguments.
    Instructions - Transcendental: >-
      Transcendental VALU instructions (SQ_INSTS_VALU_TRANS) per normalization unit.
      These cover hardware approximations such as sin, cos, and log on the vector
      ALU.
    Instructions - VMEM: >-
      Number of vector memory instructions executed, including global, buffer, and
      texture operations. High VMEM counts relative to VALU may indicate memory-bound
      workloads.
    Instructions - LDS: >-
      Number of Local Data Share instructions executed. LDS provides fast shared memory
      within a workgroup. High counts indicate active use of shared memory for
      inter-work-item communication.
    LDS Direct Load Instructions: >-
      Number of direct LDS load instructions. Direct loads fetch data from LDS without
      address indirection. These are typically faster than indexed LDS operations.
    LDS Parameter Load Instructions: >-
      Number of LDS parameter load instructions. These load shader input parameters
      that have been staged in LDS for efficient access by the wavefront.
    WAVE32 LDS Parameter Load Instructions: >-
      Number of LDS parameter loads executed in wave32 mode. RDNA 3.5 supports both
      wave32 and wave64 execution modes, with wave32 providing lower latency for
      some operations.
    Wait for Any: >-
      Percentage of wavefront lifetime spent waiting for any reason. High wait
      percentages indicate opportunities to improve performance through better
      memory access patterns, reduced synchronization, or increased occupancy.
    Wait for Instruction Fetch: >-
      Percentage of wavefront lifetime spent waiting for instruction fetch. High values
      may indicate instruction cache misses, large kernel code, or divergent control
      flow impacting instruction locality.
    Wait for Barrier: >-
      Percentage of wavefront lifetime spent at barrier synchronization points. High
      barrier wait times may indicate workload imbalance within workgroups. Consider
      restructuring algorithms to reduce synchronization frequency.
    Wait for Counter: >-
      Percentage of wavefront lifetime spent waiting for memory operation counters.
      High values indicate memory latency is impacting performance. Consider improving
      memory access patterns or increasing occupancy to hide latency.
    Icache Hit Rate: >-
      Percentage of instruction cache accesses that hit. High hit rates are essential
      for sustained instruction throughput. Low rates may indicate large kernels or
      divergent branches causing instruction cache thrashing.
    Dcache Hit Rate: >-
      Percentage of scalar data cache accesses that hit. High hit rates indicate
      efficient reuse of constant and uniform data. Low rates may suggest excessive
      unique constant data or poor temporal locality.
