# =============================================================================
# RDNA3.5 (gfx1151) - RDNA3.5 GL1C (L1 Cache) Performance Metrics
# =============================================================================
# GL1C is the shared L1 cache serving multiple WGPs within a Shader Engine
# Cache hierarchy: TCP (L0) -> GL1C (L1) -> GL2C (L2)
# =============================================================================

Panel Config:
  id: 1100
  title: GL1 Cache (L1)
  data source:
  # =========================================================================
  # GL1C Utilization
  # =========================================================================
  - metric_table:
      id: 1101
      title: "GL1C Utilization"
      header:
        metric: Metric
        avg: Avg
        min: Min
        max: Max
        unit: Unit
      metric:
        GL1C Busy:
          avg: SUM(100 * GL1C_BUSY) / SUM(GL1C_CYCLE)
          min: MIN(100 * GL1C_BUSY / GL1C_CYCLE)
          max: MAX(100 * GL1C_BUSY / GL1C_CYCLE)
          unit: Percent
        GL1C Starve:
          avg: SUM(100 * GL1C_STARVE) / SUM(GL1C_CYCLE)
          min: MIN(100 * GL1C_STARVE / GL1C_CYCLE)
          max: MAX(100 * GL1C_STARVE / GL1C_CYCLE)
          unit: Percent

  # =========================================================================
  # GL1C Request Statistics
  # =========================================================================
  - metric_table:
      id: 1102
      title: "GL1C Request Statistics"
      header:
        metric: Metric
        avg: Avg
        min: Min
        max: Max
        unit: Unit
      metric:
        Total Requests:
          avg: SUM(GL1C_REQ_sum) / SUM($denom)
          min: MIN(GL1C_REQ_sum / $denom)
          max: MAX(GL1C_REQ_sum / $denom)
          unit: (Count + $normUnit)
        Read Requests:
          avg: SUM(GL1C_REQ_READ_sum) / SUM($denom)
          min: MIN(GL1C_REQ_READ_sum / $denom)
          max: MAX(GL1C_REQ_READ_sum / $denom)
          unit: (Count + $normUnit)
        Write Requests:
          avg: SUM(GL1C_REQ_WRITE_sum) / SUM($denom)
          min: MIN(GL1C_REQ_WRITE_sum / $denom)
          max: MAX(GL1C_REQ_WRITE_sum / $denom)
          unit: (Count + $normUnit)
        Miss Requests:
          avg: SUM(GL1C_REQ_MISS_sum) / SUM($denom)
          min: MIN(GL1C_REQ_MISS_sum / $denom)
          max: MAX(GL1C_REQ_MISS_sum / $denom)
          unit: (Count + $normUnit)

  # =========================================================================
  # GL1C Cache Performance
  # =========================================================================
  - metric_table:
      id: 1103
      title: "GL1C Cache Performance"
      header:
        metric: Metric
        avg: Avg
        min: Min
        max: Max
        unit: Unit
      metric:
        Hit Rate:
          avg: SUM(100 * (GL1C_REQ_sum - GL1C_REQ_MISS_sum)) / SUM(GL1C_REQ_sum)
          min: MIN(100 * (GL1C_REQ_sum - GL1C_REQ_MISS_sum) / GL1C_REQ_sum)
          max: MAX(100 * (GL1C_REQ_sum - GL1C_REQ_MISS_sum) / GL1C_REQ_sum)
          unit: Percent

  # =========================================================================
  # GL1C-GL2 Interface
  # =========================================================================
  - metric_table:
      id: 1104
      title: "GL1C-GL2 Interface"
      header:
        metric: Metric
        avg: Avg
        min: Min
        max: Max
        unit: Unit
      metric:
        GL2 Read Requests:
          avg: SUM(GL1C_GL2_REQ_READ_sum) / SUM($denom)
          min: MIN(GL1C_GL2_REQ_READ_sum / $denom)
          max: MAX(GL1C_GL2_REQ_READ_sum / $denom)
          unit: (Count + $normUnit)
        GL2 Read 128B Requests:
          avg: SUM(GL1C_GL2_REQ_READ_128B_sum) / SUM($denom)
          min: MIN(GL1C_GL2_REQ_READ_128B_sum / $denom)
          max: MAX(GL1C_GL2_REQ_READ_128B_sum / $denom)
          unit: (Count + $normUnit)
        GL2 Write Requests:
          avg: SUM(GL1C_GL2_REQ_WRITE_sum) / SUM($denom)
          min: MIN(GL1C_GL2_REQ_WRITE_sum / $denom)
          max: MAX(GL1C_GL2_REQ_WRITE_sum / $denom)
          unit: (Count + $normUnit)

  # =========================================================================
  # GL1C Stalls
  # =========================================================================
  - metric_table:
      id: 1105
      title: "GL1C Stalls"
      header:
        metric: Metric
        avg: Avg
        min: Min
        max: Max
        unit: Unit
      metric:
        GL2 Stall:
          avg: SUM(GL1C_STALL_GL2_GL1_sum) / SUM($denom)
          min: MIN(GL1C_STALL_GL2_GL1_sum / $denom)
          max: MAX(GL1C_STALL_GL2_GL1_sum / $denom)
          unit: (Cycles + $normUnit)
        LFIFO Full Stall:
          avg: SUM(GL1C_STALL_LFIFO_FULL_sum) / SUM($denom)
          min: MIN(GL1C_STALL_LFIFO_FULL_sum / $denom)
          max: MAX(GL1C_STALL_LFIFO_FULL_sum / $denom)
          unit: (Cycles + $normUnit)

  metrics_description:
    GL1C Busy: |-
      Percentage of cycles where the GL1C cache was busy processing requests.
      GL1C is the shared L1 cache within each Shader Engine.
      Per sample: 100 * GL1C_BUSY / GL1C_CYCLE (when GL1C_CYCLE != 0).
    GL1C Starve: |-
      Percentage of cycles where GL1C had no pending requests from TCP.
      Per sample: 100 * GL1C_STARVE / GL1C_CYCLE (when GL1C_CYCLE != 0).
    Total Requests: |-
      Total number of requests to the GL1C cache from TCP.
    Read Requests: |-
      Number of read requests to the GL1C cache.
    Write Requests: |-
      Number of write requests to the GL1C cache.
    Miss Requests: |-
      Number of requests that missed in the GL1C cache.
    Hit Rate: |-
      Percentage of GL1C requests that hit in the cache.
    GL2 Read Requests: |-
      Number of read requests sent from GL1C to GL2C due to cache misses.
    GL2 Stall: |-
      Cycles GL1C was stalled due to backpressure from GL2C.
