# Experimental uses
Panel Config:
  id: 3000
  title: Memory Bandwidth Analysis
  data source:
  - metric_table:
      id: 3001
      title: L1 Cache
      header:
        metric: Metric
        value: Avg
        unit: Unit
      metric:
        L1 Cache - VMEM stalled by L1 Cache:
          value: (SUM(SQ_VMEM_TA_CMD_FIFO_FULL) / SUM(SQ_BUSY_CYCLES)) * 100
          unit: Percent
        L1 Cache - TA coalesce rate:
          value: (SUM(4 * TA_BUFFER_WAVEFRONTS_sum) / SUM(TA_BUFFER_TOTAL_CYCLES_sum)) * 100
          unit: Percent
        L1 Cache - VL1 coalesce efficiency:
          value: (SUM(TA_TOTAL_WAVEFRONTS_sum * 64) / SUM(TCP_TOTAL_ACCESSES_sum * 4)) * 100
          unit: Percent
        L1 Cache - TA addr stalled by TCP:
          value: (SUM(TA_ADDR_STALLED_BY_TC_CYCLES_sum) / SUM(TA_TA_BUSY_sum)) * 100
          unit: Percent
        L1 Cache - TA addr stalled by TD:
          value: (SUM(TA_ADDR_STALLED_BY_TD_CYCLES_sum) / SUM(TA_TA_BUSY_sum)) * 100
          unit: Percent
        L1 Cache - TA data stalled by TCP:
          value: (SUM(TA_DATA_STALLED_BY_TC_CYCLES_sum) / SUM(TA_TA_BUSY_sum)) * 100
          unit: Percent
        L1 Cache - TA addresser stalled:
          value: (SUM(TA_ADDRESSER_STALLED_CYCLES_sum) / SUM(TA_TA_BUSY_sum)) * 100
          unit: Percent
        L1 Cache - TA stalled by TCP (aggregated):
          value: (SUM(TCP_TCP_TA_ADDR_STALL_CYCLES_sum) / SUM(TCP_GATE_EN2_sum)) * 100
          unit: Percent
        L1 Cache - TCP hit rate:
          value: (SUM(TCP_TOTAL_CACHE_ACCESSES_sum - TCP_CACHE_MISS_sum) / SUM(TCP_TOTAL_CACHE_ACCESSES_sum)) * 100
          unit: Percent
        L1 Cache - TCP miss rate:
          value: (SUM(TCP_CACHE_MISS_sum) / SUM(TCP_TOTAL_CACHE_ACCESSES_sum)) * 100
          unit: Percent
        L1 Cache - TCP stalled by UTCL1:
          value: (SUM(TCP_UTCL1_STALL_INFLIGHT_MAX_sum) / SUM(TCP_GATE_EN2_sum)) * 100
          unit: Percent
        L1 Cache - TCP stalled by UTCL2:
          value: (SUM(TCP_UTCL1_STALL_LFIFO_NO_RES_sum) / SUM(TCP_GATE_EN2_sum)) * 100
          unit: Percent
        L1 Cache - UTCL1 hit rate:
          value: (SUM(TCP_UTCL1_TRANSLATION_HIT_sum) / SUM(TCP_UTCL1_REQUEST_sum)) * 100
          unit: Percent
        L1 Cache - UTCL1 miss rate:
          value: (SUM(TCP_UTCL1_TRANSLATION_MISS_sum) / SUM(TCP_UTCL1_REQUEST_sum)) * 100
          unit: Percent
        L1 Cache - TCP stalled by TD:
          value: (SUM(TCP_TD_TCP_STALL_CYCLES_sum) / SUM(TCP_GATE_EN2_sum)) * 100
          unit: Percent
        L1 Cache - TCP stalled by L2:
          value: (SUM(TCP_TCR_TCP_STALL_CYCLES_sum) / SUM(TCP_GATE_EN2_sum)) * 100
          unit: Percent
        L1 Cache - Tag RAM 0 Req:
          value: SUM(TCP_TAGRAM0_REQ_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        L1 Cache - Tag RAM 1 Req:
          value: SUM(TCP_TAGRAM1_REQ_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        L1 Cache - Tag RAM 2 Req:
          value: SUM(TCP_TAGRAM2_REQ_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        L1 Cache - Tag RAM 3 Req:
          value: SUM(TCP_TAGRAM3_REQ_sum) / SUM($denom)
          unit: (Requests + $normUnit)
  - metric_table:
      id: 3002
      title: L1 Traffic
      header:
        metric: Metric
        value: Avg
        unit: Unit
      metric:
        VMEM issue rate:
          value: SUM(SQ_INSTS_VMEM) / SUM(SQ_WAVE_CYCLES)
          unit: Instructions per Cycle
        L1 inbound traffic (TA_TOTAL_WAVEFRONTS):
          value: SUM(TA_TOTAL_WAVEFRONTS_sum) / SUM($denom)
          unit: (Instructions + $normUnit)
        TA processing rate:
          value: SUM(TA_TOTAL_WAVEFRONTS_sum) / SUM(TA_TA_BUSY_sum)
          unit: Instructions per Cycle
        CU-L1 throughput:
          value: SUM(TCP_TOTAL_ACCESSES_sum) / SUM(TCP_GATE_EN2_sum)
          unit: Requests per Cycle
        L1 utilization:
          value: (SUM(TCP_GATE_EN2_sum) / SUM(TCP_GATE_EN1_sum)) * 100
          unit: Percent
        L1 average latency:
          value: SUM(TCP_TCP_LATENCY_sum) / SUM(TCP_TOTAL_ACCESSES_sum)
          unit: Cycles per Request
        L1 latency:
          value: AVG(TCP_TCP_LATENCY_sum) / AVG(TCP_TOTAL_ACCESSES_sum)
          unit: Cycles per Request
        L1-L2 throughput (reads + writes):
          value: SUM((TCP_TCC_READ_REQ_sum + TCP_TCC_WRITE_REQ_sum)) / SUM(TCP_GATE_EN2_sum)
          unit: Requests per Cycle
        L1-L2 throughput (total):
          value: SUM((TCP_TCC_READ_REQ_sum + TCP_TCC_WRITE_REQ_sum + TCP_TCC_ATOMIC_WITH_RET_REQ_sum + TCP_TCC_ATOMIC_WITHOUT_RET_REQ_sum)) / SUM(TCP_GATE_EN2_sum)
          unit: Requests per Cycle
        L2 read average latency:
          value: SUM(TCP_TCC_READ_REQ_LATENCY_sum) / SUM(TCP_TCC_READ_REQ_sum)
          unit: Cycles per Request
        L2 read latency:
          value: AVG(TCP_TCC_READ_REQ_LATENCY_sum) / AVG(TCP_TCC_READ_REQ_sum)
          unit: Cycles per Request
        L2 write average latency:
          value: SUM(TCP_TCC_WRITE_REQ_LATENCY_sum) / SUM(TCP_TCC_WRITE_REQ_sum)
          unit: Cycles per Request
        L2 write latency:
          value: AVG(TCP_TCC_WRITE_REQ_LATENCY_sum) / AVG(TCP_TCC_WRITE_REQ_sum)
          unit: Cycles per Request
        UTCL1 average latency:
          value: SUM(TCP_CLIENT_UTCL1_INFLIGHT_sum) / SUM(TCP_UTCL1_REQUEST_sum)
          unit: Cycles per Request
        UTCL1 latency:
          value: AVG(TCP_CLIENT_UTCL1_INFLIGHT_sum) / AVG(TCP_UTCL1_REQUEST_sum)
          unit: Cycles per Request
        UTCL1 to UTCL2 average latency:
          value: SUM(TCP_UTCL1_UTCL2_INFLIGHT_sum) / SUM(TCP_UTCL1_TRANSLATION_MISS_sum)
          unit: Cycles per Request
        UTCL1 to UTCL2 latency:
          value: AVG(TCP_UTCL1_UTCL2_INFLIGHT_sum) / AVG(TCP_UTCL1_TRANSLATION_MISS_sum)
          unit: Cycles per Request
  - metric_table:
      id: 3003
      title: TD Return Path
      header:
        metric: Metric
        value: Avg
        unit: Unit
      metric:
        TD - stalled by TCP:
          value: (SUM(TD_TC_STALL_sum) / SUM(TD_TD_BUSY_sum)) * 100
          unit: Percent
        TD - input FIFO full:
          value: (SUM(TD_TC_TD_FIFO_FULL_sum) / SUM(TD_TD_BUSY_sum)) * 100
          unit: Percent
        TD - output FIFO full:
          value: (SUM(TD_OUTPUT_FIFO_FULL_sum) / SUM(TD_TD_BUSY_sum)) * 100
          unit: Percent
        TD - stalled by SPI:
          value: (SUM(TD_SPI_STALL_sum) / SUM(TD_TD_BUSY_sum)) * 100
          unit: Percent
        TD - L1-CU throughput:
          value: SUM(TD_LOAD_WAVEFRONT_sum) / SUM(TD_TD_BUSY_sum)
          unit: Instructions per Cycle
        TD - load wavefronts:
          value: SUM(TD_LOAD_WAVEFRONT_sum) / SUM($denom)
          unit: (Wavefronts + $normUnit)
        TD - atomic wavefronts:
          value: SUM(TD_ATOMIC_WAVEFRONT_sum) / SUM($denom)
          unit: (Wavefronts + $normUnit)
        TD - store wavefronts:
          value: SUM(TD_STORE_WAVEFRONT_sum) / SUM($denom)
          unit: (Wavefronts + $normUnit)
        TD - coalescable wavefronts rate:
          value: (SUM(TD_COALESCABLE_WAVEFRONT_sum) / SUM(TD_LOAD_WAVEFRONT_sum)) * 100
          unit: Percent
  - metric_table:
      id: 3004
      title: Normalized Stall Metrics (%)
      header:
        metric: Metric
        value: Avg
        unit: Unit
      metric:
        # SQ stalls (upstream)
        Normalized L1 Cache - VMEM stalled by L1 Cache:
          value: ((SUM(SQ_VMEM_TA_CMD_FIFO_FULL) / (SUM($GRBM_GUI_ACTIVE_PER_XCD) * $cu_per_gpu)) * 100)
          unit: Percent
        # TA stalls
        Normalized L1 Cache - TA addr stalled by TCP:
          value: ((SUM(TA_ADDR_STALLED_BY_TC_CYCLES_sum) / (SUM($GRBM_GUI_ACTIVE_PER_XCD) * $cu_per_gpu)) * 100)
          unit: Percent
        Normalized L1 Cache - TA addr stalled by TD:
          value: ((SUM(TA_ADDR_STALLED_BY_TD_CYCLES_sum) / (SUM($GRBM_GUI_ACTIVE_PER_XCD) * $cu_per_gpu)) * 100)
          unit: Percent
        Normalized L1 Cache - TA data stalled by TCP:
          value: ((SUM(TA_DATA_STALLED_BY_TC_CYCLES_sum) / (SUM($GRBM_GUI_ACTIVE_PER_XCD) * $cu_per_gpu)) * 100)
          unit: Percent
        Normalized L1 Cache - TA addresser stalled:
          value: ((SUM(TA_ADDRESSER_STALLED_CYCLES_sum) / (SUM($GRBM_GUI_ACTIVE_PER_XCD) * $cu_per_gpu)) * 100)
          unit: Percent
        Normalized L1 Cache - TA stalled by TCP (aggregated):
          value: ((SUM(TCP_TCP_TA_ADDR_STALL_CYCLES_sum) / (SUM($GRBM_GUI_ACTIVE_PER_XCD) * $cu_per_gpu)) * 100)
          unit: Percent
        # TCP stalls
        Normalized L1 Cache - TCP stalled by UTCL1:
          value: ((SUM(TCP_UTCL1_STALL_INFLIGHT_MAX_sum) / (SUM($GRBM_GUI_ACTIVE_PER_XCD) * $cu_per_gpu)) * 100)
          unit: Percent
        Normalized L1 Cache - TCP stalled by UTCL2:
          value: ((SUM(TCP_UTCL1_STALL_LFIFO_NO_RES_sum) / (SUM($GRBM_GUI_ACTIVE_PER_XCD) * $cu_per_gpu)) * 100)
          unit: Percent
        Normalized L1 Cache - TCP stalled by TD:
          value: ((SUM(TCP_TD_TCP_STALL_CYCLES_sum) / (SUM($GRBM_GUI_ACTIVE_PER_XCD) * $cu_per_gpu)) * 100)
          unit: Percent
        Normalized L1 Cache - TCP stalled by L2:
          value: ((SUM(TCP_TCR_TCP_STALL_CYCLES_sum) / (SUM($GRBM_GUI_ACTIVE_PER_XCD) * $cu_per_gpu)) * 100)
          unit: Percent
        # TD stalls
        Normalized TD - stalled by TCP:
          value: ((SUM(TD_TC_STALL_sum) / (SUM($GRBM_GUI_ACTIVE_PER_XCD) * $cu_per_gpu)) * 100)
          unit: Percent
        Normalized TD - input FIFO full:
          value: ((SUM(TD_TC_TD_FIFO_FULL_sum) / (SUM($GRBM_GUI_ACTIVE_PER_XCD) * $cu_per_gpu)) * 100)
          unit: Percent
        Normalized TD - output FIFO full:
          value: ((SUM(TD_OUTPUT_FIFO_FULL_sum) / (SUM($GRBM_GUI_ACTIVE_PER_XCD) * $cu_per_gpu)) * 100)
          unit: Percent
        Normalized TD - stalled by SPI:
          value: ((SUM(TD_SPI_STALL_sum) / (SUM($GRBM_GUI_ACTIVE_PER_XCD) * $cu_per_gpu)) * 100)
          unit: Percent
  - metric_table:
      id: 3005
      title: Normalized Throughput Metrics (per Second)
      header:
        metric: Metric
        value: Avg
        unit: Unit
      metric:
        Normalized TA processing rate:
          value: SUM(TA_TOTAL_WAVEFRONTS_sum) / (SUM((End_Timestamp - Start_Timestamp)) / 1000000000)
          unit: Instructions/s
        Normalized CU-L1 throughput:
          value: SUM(TCP_TOTAL_ACCESSES_sum) / (SUM((End_Timestamp - Start_Timestamp)) / 1000000000)
          unit: Requests/s
        Normalized L1-L2 throughput (reads + writes):
          value: SUM((TCP_TCC_READ_REQ_sum + TCP_TCC_WRITE_REQ_sum)) / (SUM((End_Timestamp - Start_Timestamp)) / 1000000000)
          unit: Requests/s
        Normalized L1-L2 throughput (total):
          value: SUM((TCP_TCC_READ_REQ_sum + TCP_TCC_WRITE_REQ_sum + TCP_TCC_ATOMIC_WITH_RET_REQ_sum + TCP_TCC_ATOMIC_WITHOUT_RET_REQ_sum)) / (SUM((End_Timestamp - Start_Timestamp)) / 1000000000)
          unit: Requests/s
        Normalized TD - L1-CU throughput:
          value: SUM(TD_LOAD_WAVEFRONT_sum) / (SUM((End_Timestamp - Start_Timestamp)) / 1000000000)
          unit: Instructions/s
  - metric_table:
      id: 3006
      title: Raw Counter Value
      header:
        metric: Metric
        value: Avg
        unit: Unit
      metric:
        # SQ counters (upstream)
        SQ_INSTS_VMEM:
          value: SUM(SQ_INSTS_VMEM) / SUM($denom)
          unit: (Instructions + $normUnit)
        SQ_WAVE_CYCLES:
          value: SUM(SQ_WAVE_CYCLES) / SUM($denom)
          unit: (Cycles + $normUnit)
        SQ_VMEM_TA_CMD_FIFO_FULL:
          value: SUM(SQ_VMEM_TA_CMD_FIFO_FULL) / SUM($denom)
          unit: (Cycles + $normUnit)
        SQ_BUSY_CYCLES:
          value: SUM(SQ_BUSY_CYCLES) / SUM($denom)
          unit: (Cycles + $normUnit)
        # TA counters
        TA_TOTAL_WAVEFRONTS:
          value: SUM(TA_TOTAL_WAVEFRONTS_sum) / SUM($denom)
          unit: (Instructions + $normUnit)
        TA_BUFFER_WAVEFRONTS:
          value: SUM(TA_BUFFER_WAVEFRONTS_sum) / SUM($denom)
          unit: (Instructions + $normUnit)
        TA_BUFFER_TOTAL_CYCLES:
          value: SUM(TA_BUFFER_TOTAL_CYCLES_sum) / SUM($denom)
          unit: (Cycles + $normUnit)
        TA_TA_BUSY:
          value: SUM(TA_TA_BUSY_sum) / SUM($denom)
          unit: (Cycles + $normUnit)
        TA_ADDR_STALLED_BY_TC_CYCLES:
          value: SUM(TA_ADDR_STALLED_BY_TC_CYCLES_sum) / SUM($denom)
          unit: (Cycles + $normUnit)
        TA_ADDR_STALLED_BY_TD_CYCLES:
          value: SUM(TA_ADDR_STALLED_BY_TD_CYCLES_sum) / SUM($denom)
          unit: (Cycles + $normUnit)
        TA_DATA_STALLED_BY_TC_CYCLES:
          value: SUM(TA_DATA_STALLED_BY_TC_CYCLES_sum) / SUM($denom)
          unit: (Cycles + $normUnit)
        TA_ADDRESSER_STALLED_CYCLES:
          value: SUM(TA_ADDRESSER_STALLED_CYCLES_sum) / SUM($denom)
          unit: (Cycles + $normUnit)
        # TCP counters
        TCP_GATE_EN1 (free running cycles):
          value: SUM(TCP_GATE_EN1_sum) / SUM($denom)
          unit: (Cycles + $normUnit)
        TCP_GATE_EN2 (busy cycles):
          value: SUM(TCP_GATE_EN2_sum) / SUM($denom)
          unit: (Cycles + $normUnit)
        TCP_TOTAL_ACCESSES:
          value: SUM(TCP_TOTAL_ACCESSES_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        TCP_TOTAL_CACHE_ACCESSES:
          value: SUM(TCP_TOTAL_CACHE_ACCESSES_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        TCP_CACHE_MISS:
          value: SUM(TCP_CACHE_MISS_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        TCP_TCP_LATENCY:
          value: SUM(TCP_TCP_LATENCY_sum) / SUM($denom)
          unit: (Cycles + $normUnit)
        TCP_TCP_TA_ADDR_STALL_CYCLES:
          value: SUM(TCP_TCP_TA_ADDR_STALL_CYCLES_sum) / SUM($denom)
          unit: (Cycles + $normUnit)
        TCP_TD_TCP_STALL_CYCLES:
          value: SUM(TCP_TD_TCP_STALL_CYCLES_sum) / SUM($denom)
          unit: (Cycles + $normUnit)
        TCP_TCR_TCP_STALL_CYCLES:
          value: SUM(TCP_TCR_TCP_STALL_CYCLES_sum) / SUM($denom)
          unit: (Cycles + $normUnit)
        TCP_TAGRAM0_REQ:
          value: SUM(TCP_TAGRAM0_REQ_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        TCP_TAGRAM1_REQ:
          value: SUM(TCP_TAGRAM1_REQ_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        TCP_TAGRAM2_REQ:
          value: SUM(TCP_TAGRAM2_REQ_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        TCP_TAGRAM3_REQ:
          value: SUM(TCP_TAGRAM3_REQ_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        # TCP UTCL1 counters
        TCP_UTCL1_REQUEST:
          value: SUM(TCP_UTCL1_REQUEST_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        TCP_UTCL1_TRANSLATION_HIT:
          value: SUM(TCP_UTCL1_TRANSLATION_HIT_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        TCP_UTCL1_TRANSLATION_MISS:
          value: SUM(TCP_UTCL1_TRANSLATION_MISS_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        TCP_UTCL1_STALL_INFLIGHT_MAX:
          value: SUM(TCP_UTCL1_STALL_INFLIGHT_MAX_sum) / SUM($denom)
          unit: (Cycles + $normUnit)
        TCP_UTCL1_STALL_LFIFO_NO_RES:
          value: SUM(TCP_UTCL1_STALL_LFIFO_NO_RES_sum) / SUM($denom)
          unit: (Cycles + $normUnit)
        TCP_CLIENT_UTCL1_INFLIGHT:
          value: SUM(TCP_CLIENT_UTCL1_INFLIGHT_sum) / SUM($denom)
          unit: (Cycles + $normUnit)
        TCP_UTCL1_UTCL2_INFLIGHT:
          value: SUM(TCP_UTCL1_UTCL2_INFLIGHT_sum) / SUM($denom)
          unit: (Cycles + $normUnit)
        # TCP-TCC interface counters
        TCP_TCC_READ_REQ:
          value: SUM(TCP_TCC_READ_REQ_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        TCP_TCC_WRITE_REQ:
          value: SUM(TCP_TCC_WRITE_REQ_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        TCP_TCC_ATOMIC_WITH_RET_REQ:
          value: SUM(TCP_TCC_ATOMIC_WITH_RET_REQ_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        TCP_TCC_ATOMIC_WITHOUT_RET_REQ:
          value: SUM(TCP_TCC_ATOMIC_WITHOUT_RET_REQ_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        TCP_TCC_READ_REQ_LATENCY:
          value: SUM(TCP_TCC_READ_REQ_LATENCY_sum) / SUM($denom)
          unit: (Cycles + $normUnit)
        TCP_TCC_WRITE_REQ_LATENCY:
          value: SUM(TCP_TCC_WRITE_REQ_LATENCY_sum) / SUM($denom)
          unit: (Cycles + $normUnit)
        # TD counters (return path)
        TD_TD_BUSY:
          value: SUM(TD_TD_BUSY_sum) / SUM($denom)
          unit: (Cycles + $normUnit)
        TD_TC_STALL:
          value: SUM(TD_TC_STALL_sum) / SUM($denom)
          unit: (Cycles + $normUnit)
        TD_TC_TD_FIFO_FULL:
          value: SUM(TD_TC_TD_FIFO_FULL_sum) / SUM($denom)
          unit: (Cycles + $normUnit)
        TD_OUTPUT_FIFO_FULL:
          value: SUM(TD_OUTPUT_FIFO_FULL_sum) / SUM($denom)
          unit: (Cycles + $normUnit)
        TD_SPI_STALL:
          value: SUM(TD_SPI_STALL_sum) / SUM($denom)
          unit: (Cycles + $normUnit)
        TD_LOAD_WAVEFRONT:
          value: SUM(TD_LOAD_WAVEFRONT_sum) / SUM($denom)
          unit: (Instructions + $normUnit)
        TD_ATOMIC_WAVEFRONT:
          value: SUM(TD_ATOMIC_WAVEFRONT_sum) / SUM($denom)
          unit: (Instructions + $normUnit)
        TD_STORE_WAVEFRONT:
          value: SUM(TD_STORE_WAVEFRONT_sum) / SUM($denom)
          unit: (Instructions + $normUnit)
        TD_COALESCABLE_WAVEFRONT:
          value: SUM(TD_COALESCABLE_WAVEFRONT_sum) / SUM($denom)
          unit: (Instructions + $normUnit)
        # GRBM counters (global)
        GRBM_GUI_ACTIVE:
          value: SUM(GRBM_GUI_ACTIVE) / SUM($denom)
          unit: (Cycles + $normUnit)
        GRBM_COUNT:
          value: SUM(GRBM_COUNT) / SUM($denom)
          unit: (Cycles + $normUnit)
        # Misc
        Num CUs:
          value: $cu_per_gpu
          unit: Count
  - metric_table:
      id: 3007
      title: L2 Cache
      header:
        metric: Metric
        value: Avg
        unit: Unit
      metric:
        L2 hit rate:
          value: ((SUM(TCC_HIT_sum) / SUM(TCC_HIT_sum + TCC_MISS_sum)) * 100)
          unit: Percent
        L2 utilization:
          value: ((SUM(TCC_BUSY_sum) / (SUM($GRBM_GUI_ACTIVE_PER_XCD) * TO_INT($total_l2_chan))) * 100)
          unit: Percent
        L2 tag stall rate:
          value: ((SUM(TCC_TAG_STALL_sum) / SUM(TCC_BUSY_sum)) * 100)
          unit: Percent
        L2 input buffer stall rate:
          value: ((SUM(TCC_IB_STALL_sum) / SUM(TCC_BUSY_sum)) * 100)
          unit: Percent
        L2 latency FIFO full rate:
          value: ((SUM(TCC_LATENCY_FIFO_FULL_sum) / SUM(TCC_BUSY_sum)) * 100)
          unit: Percent
        L2 write data FIFO full rate:
          value: ((SUM(TCC_SRC_FIFO_FULL_sum) / SUM(TCC_BUSY_sum)) * 100)
          unit: Percent
        L2 to EA write stall rate:
          value: ((SUM(TCC_EA0_WRREQ_STALL_sum) / SUM(TCC_BUSY_sum)) * 100)
          unit: Percent
        L2 to EA too many writes stall:
          value: ((SUM(TCC_TOO_MANY_EA_WRREQS_STALL_sum) / SUM(TCC_BUSY_sum)) * 100)
          unit: Percent
        L2 to EA read credit stall (HBM):
          value: ((SUM(TCC_EA0_RDREQ_DRAM_CREDIT_STALL_sum) / SUM(TCC_BUSY_sum)) * 100)
          unit: Percent
        L2 to EA write credit stall (HBM):
          value: ((SUM(TCC_EA0_WRREQ_DRAM_CREDIT_STALL_sum) / SUM(TCC_BUSY_sum)) * 100)
          unit: Percent
        L2 to EA read credit stall (GMI):
          value: ((SUM(TCC_EA0_RDREQ_GMI_CREDIT_STALL_sum) / SUM(TCC_BUSY_sum)) * 100)
          unit: Percent
        L2 to EA write credit stall (GMI):
          value: ((SUM(TCC_EA0_WRREQ_GMI_CREDIT_STALL_sum) / SUM(TCC_BUSY_sum)) * 100)
          unit: Percent
        L2 to EA read credit stall (IO):
          value: ((SUM(TCC_EA0_RDREQ_IO_CREDIT_STALL_sum) / SUM(TCC_BUSY_sum)) * 100)
          unit: Percent
        L2 to EA write credit stall (IO):
          value: ((SUM(TCC_EA0_WRREQ_IO_CREDIT_STALL_sum) / SUM(TCC_BUSY_sum)) * 100)
          unit: Percent
  - metric_table:
      id: 3008
      title: L2 Traffic
      header:
        metric: Metric
        value: Avg
        unit: Unit
      metric:
        L2 read request rate:
          value: SUM(TCC_READ_sum) / SUM(TCC_BUSY_sum)
          unit: Requests per Cycle
        L2 write request rate:
          value: SUM(TCC_WRITE_sum) / SUM(TCC_BUSY_sum)
          unit: Requests per Cycle
        L2 total request rate:
          value: SUM(TCC_REQ_sum) / SUM(TCC_BUSY_sum)
          unit: Requests per Cycle
        L2 to EA read average latency:
          value: SUM(TCC_EA0_RDREQ_LEVEL_sum) / SUM(TCC_EA0_RDREQ_sum)
          unit: Cycles per Request
        L2 to EA read latency:
          value: AVG(TCC_EA0_RDREQ_LEVEL_sum) / AVG(TCC_EA0_RDREQ_sum)
          unit: Cycles per Request
        L2 to EA write average latency:
          value: SUM(TCC_EA0_WRREQ_LEVEL_sum) / SUM(TCC_EA0_WRREQ_sum)
          unit: Cycles per Request
        L2 to EA write latency:
          value: AVG(TCC_EA0_WRREQ_LEVEL_sum) / AVG(TCC_EA0_WRREQ_sum)
          unit: Cycles per Request
        L2 to EA atomic average latency:
          value: SUM(TCC_EA0_ATOMIC_LEVEL_sum) / SUM(TCC_EA0_ATOMIC_sum)
          unit: Cycles per Request
        L2 to EA atomic latency:
          value: AVG(TCC_EA0_ATOMIC_LEVEL_sum) / AVG(TCC_EA0_ATOMIC_sum)
          unit: Cycles per Request
        L2 writeback rate:
          value: ((SUM(TCC_WRITEBACK_sum) / SUM(TCC_REQ_sum)) * 100)
          unit: Percent
        L2 eviction rate:
          value: ((SUM(TCC_NORMAL_EVICT_sum) / SUM(TCC_REQ_sum)) * 100)
          unit: Percent
        L2 to EA read BW:
          value: ((SUM((TCC_EA0_RDREQ_32B_sum * 32) + (TCC_EA0_RDREQ_64B_sum * 64)
            + (TCC_EA0_RDREQ_128B_sum * 128))) / (SUM(End_Timestamp - Start_Timestamp)))
          unit: GB/s
        L2 to EA write and atomic BW:
          value: ((SUM((TCC_EA0_WRREQ_64B_sum * 64) + (NOISE_CLAMP((TCC_EA0_WRREQ_sum - TCC_EA0_WRREQ_64B_sum), TCC_EA0_WRREQ_sum)
            * 32))) / (SUM(End_Timestamp - Start_Timestamp)))
          unit: GB/s
        HBM read fraction:
          value: ((SUM(TCC_EA0_RDREQ_DRAM_sum) / SUM(TCC_EA0_RDREQ_sum)) * 100)
          unit: Percent
        HBM write fraction:
          value: ((SUM(TCC_EA0_WRREQ_DRAM_sum) / SUM(TCC_EA0_WRREQ_sum)) * 100)
          unit: Percent
        Non-coherent request rate:
          value: ((SUM(TCC_NC_REQ_sum) / SUM(TCC_REQ_sum)) * 100)
          unit: Percent
        Uncached request rate:
          value: ((SUM(TCC_UC_REQ_sum) / SUM(TCC_REQ_sum)) * 100)
          unit: Percent
        Coherent cached request rate:
          value: ((SUM(TCC_CC_REQ_sum) / SUM(TCC_REQ_sum)) * 100)
          unit: Percent
        Probe request rate:
          value: SUM(TCC_PROBE_sum) / SUM(TCC_BUSY_sum)
          unit: Requests per Cycle
        Probe eviction rate:
          value: ((SUM(TCC_PROBE_EVICT_sum) / SUM(TCC_PROBE_sum)) * 100)
          unit: Percent
