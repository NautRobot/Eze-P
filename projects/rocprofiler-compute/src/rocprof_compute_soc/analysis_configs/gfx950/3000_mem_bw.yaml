  - metric_table:
      id: 3010
      title: Normalized L2 Stall Metrics (%)
      header:
        metric: Metric
        value: Avg
        unit: Unit
      metric:
        # Normalized stall metrics use (GRBM_GUI_ACTIVE_PER_XCD * total_l2_chan) as denominator.
        # The total_l2_chan factor normalizes the per-channel counter sums to give average percentage per channel.
        Normalized L2 - Tag stall:
          value: (SUM(TCC_TAG_STALL_sum) / (SUM($GRBM_GUI_ACTIVE_PER_XCD) * TO_INT($total_l2_chan))) * 100
          unit: Percent
        Normalized L2 - Input buffer stall:
          value: (SUM(TCC_IB_STALL_sum) / (SUM($GRBM_GUI_ACTIVE_PER_XCD) * TO_INT($total_l2_chan))) * 100
          unit: Percent
        Normalized L2 - Latency FIFO full:
          value: (SUM(TCC_LATENCY_FIFO_FULL_sum) / (SUM($GRBM_GUI_ACTIVE_PER_XCD) * TO_INT($total_l2_chan))) * 100
          unit: Percent
        Normalized L2 - Source FIFO full:
          value: (SUM(TCC_SRC_FIFO_FULL_sum) / (SUM($GRBM_GUI_ACTIVE_PER_XCD) * TO_INT($total_l2_chan))) * 100
          unit: Percent
        Normalized L2 to EA - Write stall:
          value: (SUM(TCC_EA0_WRREQ_STALL_sum) / (SUM($GRBM_GUI_ACTIVE_PER_XCD) * TO_INT($total_l2_chan))) * 100
          unit: Percent
        Normalized L2 to EA - Too many writes stall:
          value: (SUM(TCC_TOO_MANY_EA_WRREQS_STALL_sum) / (SUM($GRBM_GUI_ACTIVE_PER_XCD) * TO_INT($total_l2_chan))) * 100
          unit: Percent
        Normalized L2 to EA - Read credit stall (HBM):
          value: (SUM(TCC_EA0_RDREQ_DRAM_CREDIT_STALL_sum) / (SUM($GRBM_GUI_ACTIVE_PER_XCD) * TO_INT($total_l2_chan))) * 100
          unit: Percent
        Normalized L2 to EA - Write credit stall (HBM):
          value: (SUM(TCC_EA0_WRREQ_DRAM_CREDIT_STALL_sum) / (SUM($GRBM_GUI_ACTIVE_PER_XCD) * TO_INT($total_l2_chan))) * 100
          unit: Percent
        Normalized L2 to EA - Read credit stall (GMI):
          value: (SUM(TCC_EA0_RDREQ_GMI_CREDIT_STALL_sum) / (SUM($GRBM_GUI_ACTIVE_PER_XCD) * TO_INT($total_l2_chan))) * 100
          unit: Percent
        Normalized L2 to EA - Write credit stall (GMI):
          value: (SUM(TCC_EA0_WRREQ_GMI_CREDIT_STALL_sum) / (SUM($GRBM_GUI_ACTIVE_PER_XCD) * TO_INT($total_l2_chan))) * 100
          unit: Percent
        Normalized L2 to EA - Read credit stall (IO):
          value: (SUM(TCC_EA0_RDREQ_IO_CREDIT_STALL_sum) / (SUM($GRBM_GUI_ACTIVE_PER_XCD) * TO_INT($total_l2_chan))) * 100
          unit: Percent
        Normalized L2 to EA - Write credit stall (IO):
          value: (SUM(TCC_EA0_WRREQ_IO_CREDIT_STALL_sum) / (SUM($GRBM_GUI_ACTIVE_PER_XCD) * TO_INT($total_l2_chan))) * 100
          unit: Percent
  - metric_table:
      id: 3011
      title: Normalized L2 Throughput Metrics (per Second)
      header:
        metric: Metric
        value: Avg
        unit: Unit
      metric:
        # Normalized throughput metrics use wall-clock time for absolute measurement
        Normalized L2 read requests:
          value: SUM(TCC_READ_sum) / (SUM(End_Timestamp - Start_Timestamp) / 1000000000)
          unit: Requests/s
        Normalized L2 write requests:
          value: SUM(TCC_WRITE_sum) / (SUM(End_Timestamp - Start_Timestamp) / 1000000000)
          unit: Requests/s
        Normalized L2 total requests:
          value: SUM(TCC_REQ_sum) / (SUM(End_Timestamp - Start_Timestamp) / 1000000000)
          unit: Requests/s
        Normalized L2 to EA read requests:
          value: SUM(TCC_EA0_RDREQ_sum) / (SUM(End_Timestamp - Start_Timestamp) / 1000000000)
          unit: Requests/s
        Normalized L2 to EA write requests:
          value: SUM(TCC_EA0_WRREQ_sum) / (SUM(End_Timestamp - Start_Timestamp) / 1000000000)
          unit: Requests/s
        Normalized L2 hits:
          value: SUM(TCC_HIT_sum) / (SUM(End_Timestamp - Start_Timestamp) / 1000000000)
          unit: Hits/s
        Normalized L2 misses:
          value: SUM(TCC_MISS_sum) / (SUM(End_Timestamp - Start_Timestamp) / 1000000000)
          unit: Misses/s
  - metric_table:
      id: 3012
      title: L2 Bottleneck Detection Indicators
      header:
        metric: Metric
        value: Avg
        unit: Unit
      metric:
        # Memory BW bound: High BW utilization (>80%) + High credit stalls (>10%)
        L2 Back Pressure Indicator:
          value: ((SUM(TCC_IB_STALL_sum) / SUM(TCC_BUSY_sum)) * 100)
          unit: Percent
        L2 Memory BW Bound - Read Credit Pressure:
          value: ((SUM(TCC_EA0_RDREQ_DRAM_CREDIT_STALL_sum) / SUM(TCC_BUSY_sum)) * 100)
          unit: Percent
        L2 Memory BW Bound - Write Credit Pressure:
          value: ((SUM(TCC_EA0_WRREQ_DRAM_CREDIT_STALL_sum) / SUM(TCC_BUSY_sum)) * 100)
          unit: Percent
        L2 Memory BW Bound - Combined Credit Pressure:
          value: ((SUM(TCC_EA0_RDREQ_DRAM_CREDIT_STALL_sum + TCC_EA0_WRREQ_DRAM_CREDIT_STALL_sum) / SUM(TCC_BUSY_sum)) * 100)
          unit: Percent
        L2 Internal Resource Pressure - Latency FIFO:
          value: ((SUM(TCC_LATENCY_FIFO_FULL_sum) / SUM(TCC_BUSY_sum)) * 100)
          unit: Percent
        L2 Internal Resource Pressure - Source FIFO:
          value: ((SUM(TCC_SRC_FIFO_FULL_sum) / SUM(TCC_BUSY_sum)) * 100)
          unit: Percent
        L2 Cache Efficiency:
          value: ((SUM(TCC_HIT_sum) / SUM(TCC_HIT_sum + TCC_MISS_sum)) * 100)
          unit: Percent
        L2 to Memory Traffic Ratio:
          value: ((SUM(TCC_EA0_RDREQ_sum + TCC_EA0_WRREQ_sum) / SUM(TCC_REQ_sum)) * 100)
          unit: Percent
        L2 Remote Access Pressure (GMI):
          value: ((SUM(TCC_EA0_RDREQ_GMI_CREDIT_STALL_sum + TCC_EA0_WRREQ_GMI_CREDIT_STALL_sum) / SUM(TCC_BUSY_sum)) * 100)
          unit: Percent
  - metric_table:
      id: 3013
      title: EA Interface
      header:
        metric: Metric
        value: Avg
        unit: Unit
      metric:
        EA utilization:
          value: ((SUM(GRBM_EA_BUSY) / SUM(GRBM_GUI_ACTIVE)) * 100)
          unit: Percent
        EA read request fraction - HBM:
          value: ((SUM(TCC_EA0_RDREQ_DRAM_sum) / SUM(TCC_EA0_RDREQ_sum)) * 100)
          unit: Percent
        EA read BW fraction - HBM:
          value: ((SUM(TCC_EA0_RDREQ_DRAM_32B_sum) / SUM(TCC_EA0_RDREQ_DRAM_32B_sum
            + TCC_EA0_RDREQ_GMI_32B_sum + TCC_EA0_RDREQ_IO_32B_sum)) * 100)
          unit: Percent
        EA read BW fraction - GMI:
          value: ((SUM(TCC_EA0_RDREQ_GMI_32B_sum) / SUM(TCC_EA0_RDREQ_DRAM_32B_sum
            + TCC_EA0_RDREQ_GMI_32B_sum + TCC_EA0_RDREQ_IO_32B_sum)) * 100)
          unit: Percent
        EA read BW fraction - IO:
          value: ((SUM(TCC_EA0_RDREQ_IO_32B_sum) / SUM(TCC_EA0_RDREQ_DRAM_32B_sum
            + TCC_EA0_RDREQ_GMI_32B_sum + TCC_EA0_RDREQ_IO_32B_sum)) * 100)
          unit: Percent
        EA write request fraction - HBM:
          value: ((SUM(TCC_EA0_WRREQ_DRAM_sum) / SUM(TCC_EA0_WRREQ_sum)) * 100)
          unit: Percent
        EA atomic fraction of writes:
          value: ((SUM(TCC_EA0_ATOMIC_sum) / SUM(TCC_EA0_WRREQ_sum)) * 100)
          unit: Percent
        EA HBM write vs atomic split:
          value: ((SUM(TCC_EA0_WRREQ_WRITE_DRAM_sum) / SUM(TCC_EA0_WRREQ_DRAM_sum)) * 100)
          unit: Percent
        EA uncached read fraction:
          value: ((SUM(TCC_EA0_RD_UNCACHED_32B_sum) / SUM(TCC_EA0_RDREQ_sum)) * 100)
          unit: Percent
        EA uncached write fraction:
          value: ((SUM(TCC_EA0_WR_UNCACHED_32B_sum) / SUM(TCC_EA0_WRREQ_sum)) * 100)
          unit: Percent
  - metric_table:
      id: 3014
      title: EA Traffic
      header:
        metric: Metric
        value: Avg
        unit: Unit
      metric:
        EA to HBM read BW:
          value: ((SUM(TCC_EA0_RDREQ_DRAM_32B_sum * 32)) / (SUM(End_Timestamp - Start_Timestamp)))
          unit: GB/s
        EA to HBM write BW:
          value: ((SUM(TCC_EA0_WRREQ_WRITE_DRAM_32B_sum * 32)) / (SUM(End_Timestamp - Start_Timestamp)))
          unit: GB/s
        EA to HBM atomic BW:
          value: ((SUM(TCC_EA0_WRREQ_ATOMIC_DRAM_32B_sum * 32)) / (SUM(End_Timestamp - Start_Timestamp)))
          unit: GB/s
        EA to HBM total BW:
          value: ((SUM((TCC_EA0_RDREQ_DRAM_32B_sum + TCC_EA0_WRREQ_WRITE_DRAM_32B_sum
            + TCC_EA0_WRREQ_ATOMIC_DRAM_32B_sum) * 32)) / (SUM(End_Timestamp - Start_Timestamp)))
          unit: GB/s
        EA to GMI read BW:
          value: ((SUM(TCC_EA0_RDREQ_GMI_32B_sum * 32)) / (SUM(End_Timestamp - Start_Timestamp)))
          unit: GB/s
        EA to GMI write BW:
          value: ((SUM(TCC_EA0_WRREQ_WRITE_GMI_32B_sum * 32)) / (SUM(End_Timestamp - Start_Timestamp)))
          unit: GB/s
        EA to GMI atomic BW:
          value: ((SUM(TCC_EA0_WRREQ_ATOMIC_GMI_32B_sum * 32)) / (SUM(End_Timestamp - Start_Timestamp)))
          unit: GB/s
        EA to IO read BW:
          value: ((SUM(TCC_EA0_RDREQ_IO_32B_sum * 32)) / (SUM(End_Timestamp - Start_Timestamp)))
          unit: GB/s
        EA to IO write BW:
          value: ((SUM(TCC_EA0_WRREQ_WRITE_IO_32B_sum * 32)) / (SUM(End_Timestamp - Start_Timestamp)))
          unit: GB/s
        EA to IO atomic BW:
          value: ((SUM(TCC_EA0_WRREQ_ATOMIC_IO_32B_sum * 32)) / (SUM(End_Timestamp - Start_Timestamp)))
          unit: GB/s
        EA read average latency:
          value: SUM(TCC_EA0_RDREQ_LEVEL_sum) / SUM(TCC_EA0_RDREQ_sum)
          unit: Cycles per Request
        EA read latency:
          value: AVG(TCC_EA0_RDREQ_LEVEL_sum) / AVG(TCC_EA0_RDREQ_sum)
          unit: Cycles per Request
        EA write average latency:
          value: SUM(TCC_EA0_WRREQ_LEVEL_sum) / SUM(TCC_EA0_WRREQ_sum)
          unit: Cycles per Request
        EA write latency:
          value: AVG(TCC_EA0_WRREQ_LEVEL_sum) / AVG(TCC_EA0_WRREQ_sum)
          unit: Cycles per Request
        EA atomic average latency:
          value: SUM(TCC_EA0_ATOMIC_LEVEL_sum) / SUM(TCC_EA0_ATOMIC_sum)
          unit: Cycles per Request
        EA atomic latency:
          value: AVG(TCC_EA0_ATOMIC_LEVEL_sum) / AVG(TCC_EA0_ATOMIC_sum)
          unit: Cycles per Request
  - metric_table:
      id: 3015
      title: EA Raw Counter Values
      header:
        metric: Metric
        value: Avg
        unit: Unit
      metric:
        # TCC-EA interface
        TCC_BUBBLE:
          value: SUM(TCC_BUBBLE_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        # Per-destination read (32B granularity)
        TCC_EA0_RDREQ_DRAM_32B:
          value: SUM(TCC_EA0_RDREQ_DRAM_32B_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        TCC_EA0_RDREQ_GMI_32B:
          value: SUM(TCC_EA0_RDREQ_GMI_32B_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        TCC_EA0_RDREQ_IO_32B:
          value: SUM(TCC_EA0_RDREQ_IO_32B_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        # Per-destination write
        TCC_EA0_WRREQ_WRITE_DRAM:
          value: SUM(TCC_EA0_WRREQ_WRITE_DRAM_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        TCC_EA0_WRREQ_WRITE_DRAM_32B:
          value: SUM(TCC_EA0_WRREQ_WRITE_DRAM_32B_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        TCC_EA0_WRREQ_WRITE_GMI_32B:
          value: SUM(TCC_EA0_WRREQ_WRITE_GMI_32B_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        TCC_EA0_WRREQ_WRITE_IO_32B:
          value: SUM(TCC_EA0_WRREQ_WRITE_IO_32B_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        # Per-destination atomic
        TCC_EA0_WRREQ_ATOMIC_DRAM:
          value: SUM(TCC_EA0_WRREQ_ATOMIC_DRAM_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        TCC_EA0_WRREQ_ATOMIC_DRAM_32B:
          value: SUM(TCC_EA0_WRREQ_ATOMIC_DRAM_32B_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        TCC_EA0_WRREQ_ATOMIC_GMI_32B:
          value: SUM(TCC_EA0_WRREQ_ATOMIC_GMI_32B_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        TCC_EA0_WRREQ_ATOMIC_IO_32B:
          value: SUM(TCC_EA0_WRREQ_ATOMIC_IO_32B_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        # Uncached traffic
        TCC_EA0_RD_UNCACHED_32B:
          value: SUM(TCC_EA0_RD_UNCACHED_32B_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        TCC_EA0_WR_UNCACHED_32B:
          value: SUM(TCC_EA0_WR_UNCACHED_32B_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        # GRBM counter (EA block)
        GRBM_EA_BUSY:
          value: SUM(GRBM_EA_BUSY) / SUM($denom)
          unit: (Cycles + $normUnit)
