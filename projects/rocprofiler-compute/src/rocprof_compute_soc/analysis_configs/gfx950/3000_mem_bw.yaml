# Experimental uses
Panel Config:
  id: 3000
  title: Memory Bandwidth Analysis
  data source:
  - metric_table:
      id: 3001
      title: L1 Cache
      header:
        metric: Metric
        value: Avg
        unit: Unit
      metric:
        L1 Cache - VMEM stalled by L1 Cache:
          value: SUM((SQ_VMEM_TA_CMD_FIFO_FULL * 100)) / SUM(SQ_BUSY_CYCLES)
          unit: Percent
        L1 Cache - TA coalesce rate:
          value: SUM(((4 * TA_BUFFER_WAVEFRONTS_sum) * 100)) / SUM(TA_BUFFER_TOTAL_CYCLES_sum)
          unit: Percent
        L1 Cache - VL1 coalesce efficiency:
          value: SUM(((TA_TOTAL_WAVEFRONTS_sum * 64) * 100)) / SUM((TCP_TOTAL_ACCESSES_sum * 4))
          unit: Percent
        L1 Cache - TA addr stalled by TCP:
          value: SUM((TA_ADDR_STALLED_BY_TC_CYCLES_sum * 100)) / SUM(TA_TA_BUSY_sum)
          unit: Percent
        L1 Cache - TA addr stalled by TD:
          value: SUM((TA_ADDR_STALLED_BY_TD_CYCLES_sum * 100)) / SUM(TA_TA_BUSY_sum)
          unit: Percent
        L1 Cache - TA data stalled by TCP:
          value: SUM((TA_DATA_STALLED_BY_TC_CYCLES_sum * 100)) / SUM(TA_TA_BUSY_sum)
          unit: Percent
        L1 Cache - TA addresser stalled:
          value: SUM((TA_ADDRESSER_STALLED_CYCLES_sum * 100)) / SUM(TA_TA_BUSY_sum)
          unit: Percent
        L1 Cache - TA stalled by TCP (aggregated):
          value: SUM((TCP_TCP_TA_ADDR_STALL_CYCLES_sum * 100)) / SUM(TCP_GATE_EN2_sum)
          unit: Percent
        L1 Cache - TCP hit rate:
          value: SUM(((TCP_TOTAL_CACHE_ACCESSES_sum - TCP_CACHE_MISS_sum) * 100)) / SUM(TCP_TOTAL_CACHE_ACCESSES_sum)
          unit: Percent
        L1 Cache - TCP miss rate:
          value: SUM((TCP_CACHE_MISS_sum * 100)) / SUM(TCP_TOTAL_CACHE_ACCESSES_sum)
          unit: Percent
        L1 Cache - TCP stalled by UTCL1:
          value: SUM((TCP_UTCL1_STALL_INFLIGHT_MAX_sum * 100)) / SUM(TCP_GATE_EN2_sum)
          unit: Percent
        L1 Cache - TCP stalled by UTCL2:
          value: SUM((TCP_UTCL1_STALL_LFIFO_NO_RES_sum * 100)) / SUM(TCP_GATE_EN2_sum)
          unit: Percent
        L1 Cache - UTCL1 hit rate:
          value: SUM((TCP_UTCL1_TRANSLATION_HIT_sum * 100)) / SUM(TCP_UTCL1_REQUEST_sum)
          unit: Percent
        L1 Cache - UTCL1 miss rate:
          value: SUM((TCP_UTCL1_TRANSLATION_MISS_sum * 100)) / SUM(TCP_UTCL1_REQUEST_sum)
          unit: Percent
        L1 Cache - TCP stalled by TD:
          value: SUM((TCP_TD_TCP_STALL_CYCLES_sum * 100)) / SUM(TCP_GATE_EN2_sum)
          unit: Percent
        L1 Cache - TCP stalled by L2:
          value: SUM((TCP_TCR_TCP_STALL_CYCLES_sum * 100)) / SUM(TCP_GATE_EN2_sum)
          unit: Percent
        L1 Cache - Tag RAM 0 Req:
          value: SUM(TCP_TAGRAM0_REQ_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        L1 Cache - Tag RAM 1 Req:
          value: SUM(TCP_TAGRAM1_REQ_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        L1 Cache - Tag RAM 2 Req:
          value: SUM(TCP_TAGRAM2_REQ_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        L1 Cache - Tag RAM 3 Req:
          value: SUM(TCP_TAGRAM3_REQ_sum) / SUM($denom)
          unit: (Requests + $normUnit)
  - metric_table:
      id: 3002
      title: L1 Traffic
      header:
        metric: Metric
        value: Avg
        unit: Unit
      metric:
        VMEM issue rate:
          value: SUM(SQ_INSTS_VMEM) / SUM(SQ_WAVE_CYCLES)
          unit: Instructions per Cycle
        L1 inbound traffic (TA_TOTAL_WAVEFRONTS):
          value: SUM(TA_TOTAL_WAVEFRONTS_sum) / SUM($denom)
          unit: (Instructions + $normUnit)
        TA processing rate:
          value: SUM(TA_TOTAL_WAVEFRONTS_sum) / SUM(TA_TA_BUSY_sum)
          unit: Instructions per Cycle
        CU-L1 throughput:
          value: SUM(TCP_TOTAL_ACCESSES_sum) / SUM(TCP_GATE_EN2_sum)
          unit: Requests per Cycle
        L1 utilization:
          value: SUM((TCP_GATE_EN2_sum * 100)) / SUM(TCP_GATE_EN1_sum)
          unit: Percent
        L1 latency:
          value: SUM(TCP_TCP_LATENCY_sum) / SUM(TCP_TOTAL_ACCESSES_sum)
          unit: Cycles per Request
        L1-L2 throughput (reads + writes):
          value: SUM((TCP_TCC_READ_REQ_sum + TCP_TCC_WRITE_REQ_sum)) / SUM(TCP_GATE_EN2_sum)
          unit: Requests per Cycle
        L1-L2 throughput (total):
          value: SUM((TCP_TCC_READ_REQ_sum + TCP_TCC_WRITE_REQ_sum + TCP_TCC_ATOMIC_WITH_RET_REQ_sum + TCP_TCC_ATOMIC_WITHOUT_RET_REQ_sum)) / SUM(TCP_GATE_EN2_sum)
          unit: Requests per Cycle
        L2 read latency:
          value: SUM(TCP_TCC_READ_REQ_LATENCY_sum) / SUM(TCP_TCC_READ_REQ_sum)
          unit: Cycles per Request
        L2 write latency:
          value: SUM(TCP_TCC_WRITE_REQ_LATENCY_sum) / SUM(TCP_TCC_WRITE_REQ_sum)
          unit: Cycles per Request
        UTCL1 latency:
          value: SUM(TCP_CLIENT_UTCL1_INFLIGHT_sum) / SUM(TCP_UTCL1_REQUEST_sum)
          unit: Cycles per Request
        UTCL1 to UTCL2 latency:
          value: SUM(TCP_UTCL1_UTCL2_INFLIGHT_sum) / SUM(TCP_UTCL1_TRANSLATION_MISS_sum)
          unit: Cycles per Request
  - metric_table:
      id: 3003
      title: TD Return Path
      header:
        metric: Metric
        value: Avg
        unit: Unit
      metric:
        TD - stalled by TCP:
          value: SUM((TD_TC_STALL_sum * 100)) / SUM(TD_TD_BUSY_sum)
          unit: Percent
        TD - input FIFO full:
          value: SUM((TD_TC_TD_FIFO_FULL_sum * 100)) / SUM(TD_TD_BUSY_sum)
          unit: Percent
        TD - output FIFO full:
          value: SUM((TD_OUTPUT_FIFO_FULL_sum * 100)) / SUM(TD_TD_BUSY_sum)
          unit: Percent
        TD - stalled by SPI:
          value: SUM((TD_SPI_STALL_sum * 100)) / SUM(TD_TD_BUSY_sum)
          unit: Percent
        TD - L1-CU throughput:
          value: SUM(TD_LOAD_WAVEFRONT_sum) / SUM(TD_TD_BUSY_sum)
          unit: Instructions per Cycle
        TD - load wavefronts:
          value: SUM(TD_LOAD_WAVEFRONT_sum) / SUM($denom)
          unit: (Wavefronts + $normUnit)
        TD - atomic wavefronts:
          value: SUM(TD_ATOMIC_WAVEFRONT_sum) / SUM($denom)
          unit: (Wavefronts + $normUnit)
        TD - store wavefronts:
          value: SUM(TD_STORE_WAVEFRONT_sum) / SUM($denom)
          unit: (Wavefronts + $normUnit)
        TD - coalescable wavefronts rate:
          value: SUM((TD_COALESCABLE_WAVEFRONT_sum * 100)) / SUM(TD_LOAD_WAVEFRONT_sum)
          unit: Percent
  - metric_table:
      id: 3004
      title: Normalized Stall Metrics (%)
      header:
        metric: Metric
        value: Avg
        unit: Unit
      metric:
        # SQ stalls (upstream)
        Normalized L1 Cache - VMEM stalled by L1 Cache:
          value: SUM((SQ_VMEM_TA_CMD_FIFO_FULL * 100)) / SUM($GRBM_GUI_ACTIVE_PER_XCD)
          unit: Percent
        # TA stalls
        Normalized L1 Cache - TA addr stalled by TCP:
          value: SUM((TA_ADDR_STALLED_BY_TC_CYCLES_sum * 100)) / SUM($GRBM_GUI_ACTIVE_PER_XCD)
          unit: Percent
        Normalized L1 Cache - TA addr stalled by TD:
          value: SUM((TA_ADDR_STALLED_BY_TD_CYCLES_sum * 100)) / SUM($GRBM_GUI_ACTIVE_PER_XCD)
          unit: Percent
        Normalized L1 Cache - TA data stalled by TCP:
          value: SUM((TA_DATA_STALLED_BY_TC_CYCLES_sum * 100)) / SUM($GRBM_GUI_ACTIVE_PER_XCD)
          unit: Percent
        Normalized L1 Cache - TA addresser stalled:
          value: SUM((TA_ADDRESSER_STALLED_CYCLES_sum * 100)) / SUM($GRBM_GUI_ACTIVE_PER_XCD)
          unit: Percent
        Normalized L1 Cache - TA stalled by TCP (aggregated):
          value: SUM((TCP_TCP_TA_ADDR_STALL_CYCLES_sum * 100)) / SUM($GRBM_GUI_ACTIVE_PER_XCD)
          unit: Percent
        # TCP stalls
