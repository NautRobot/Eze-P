        unit: Unit
      metric:
        # Normalized stall metrics use $GRBM_GUI_ACTIVE_PER_XCD as denominator
        # This enables direct comparison with L1 stall metrics (same denominator)
        Normalized L2 - Tag stall:
          value: (SUM(TCC_TAG_STALL_sum) / SUM($GRBM_GUI_ACTIVE_PER_XCD)) * 100
          unit: Percent
        Normalized L2 - Input buffer stall:
          value: (SUM(TCC_IB_STALL_sum) / SUM($GRBM_GUI_ACTIVE_PER_XCD)) * 100
          unit: Percent
        Normalized L2 - Latency FIFO full:
          value: (SUM(TCC_LATENCY_FIFO_FULL_sum) / SUM($GRBM_GUI_ACTIVE_PER_XCD)) * 100
          unit: Percent
        Normalized L2 - Source FIFO full:
          value: (SUM(TCC_SRC_FIFO_FULL_sum) / SUM($GRBM_GUI_ACTIVE_PER_XCD)) * 100
          unit: Percent
        Normalized L2 to EA - Write stall:
          value: (SUM(TCC_EA0_WRREQ_STALL_sum) / SUM($GRBM_GUI_ACTIVE_PER_XCD)) * 100
          unit: Percent
        Normalized L2 to EA - Too many writes stall:
