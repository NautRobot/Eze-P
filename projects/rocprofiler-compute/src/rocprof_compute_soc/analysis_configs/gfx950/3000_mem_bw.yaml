          unit: Percent
        Normalized L1 Cache - TCP stalled by UTCL2:
          value: SUM((TCP_UTCL1_STALL_LFIFO_NO_RES_sum * 100)) / SUM($GRBM_GUI_ACTIVE_PER_XCD)
          unit: Percent
        Normalized L1 Cache - TCP stalled by TD:
          value: SUM((TCP_TD_TCP_STALL_CYCLES_sum * 100)) / SUM($GRBM_GUI_ACTIVE_PER_XCD)
          unit: Percent
        Normalized L1 Cache - TCP stalled by L2:
          value: SUM((TCP_TCR_TCP_STALL_CYCLES_sum * 100)) / SUM($GRBM_GUI_ACTIVE_PER_XCD)
          unit: Percent
        # TD stalls
        Normalized TD - stalled by TCP:
          value: SUM((TD_TC_STALL_sum * 100)) / SUM($GRBM_GUI_ACTIVE_PER_XCD)
          unit: Percent
        Normalized TD - input FIFO full:
          value: SUM((TD_TC_TD_FIFO_FULL_sum * 100)) / SUM($GRBM_GUI_ACTIVE_PER_XCD)
          unit: Percent
        Normalized TD - output FIFO full:
          value: SUM((TD_OUTPUT_FIFO_FULL_sum * 100)) / SUM($GRBM_GUI_ACTIVE_PER_XCD)
          unit: Percent
        Normalized TD - stalled by SPI:
