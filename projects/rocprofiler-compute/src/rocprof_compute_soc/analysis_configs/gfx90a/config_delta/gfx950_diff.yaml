- Panel Config:
    id: 1000
  metric_descriptions:
    Spill/Stack Coalesceable Instr: The total number of coalesceable spill/stack memory instructions executed on all compute units, per normalization unit. Higher values indicate better memory access patterns for private memory operations.
    MFMA-F8: The total number of 8-bit floating point MFMA instructions issued per normalization unit. This is supported in AMD Instinct MI300 series and later only.
    MFMA-F6F4: The total number of 4-bit and 6-bit floating point MFMA instructions issued per normalization unit. This is supported in AMD Instinct MI350 series (gfx950) and later only.
