# =============================================================================
# RDNA3.5 (gfx115x) - RDNA3.5 Memory Hierarchy Chart Metrics
# =============================================================================
#
# This panel provides detailed memory hierarchy metrics for visualization,
# organized by cache level:
#   - Instruction Cache (SQC)
#   - Scalar Data Cache (SQC)
#   - TCP Cache (GL0 Vector Cache)
#   - LDS (Local Data Share)
#   - GL1 Cache (L1)
#   - GL2 Cache (L2)
#   - Graphics Core Efficiency Arbiter (GCEA) to system memory (DDR5/LPDDR5 for APU)
# =============================================================================

Panel Config:
  id: 300
  title: Memory Chart
  description: >-
    Detailed memory hierarchy metrics for RDNA3.5, showing request counts,
    bandwidth, hit rates, and utilization at each cache level.
    Memory hierarchy: LDS/TCP (L0) -> GL1C (L1) -> GL2C (L2) -> System Memory via GCEA
    (Graphics Core Efficiency Arbiter).

    Use this panel as the reference for **where** bandwidth is measured: GL2C Read/Write
    Bandwidth use **client-side** GL2 counters; GCEA (Graphics Core Efficiency Arbiter)
    tables use **DRAM interface** counters.
    System Speed-of-Light lists separate **L2->fabric (EA)** and **memory controller** rates;
    those are kernel-summary views and are not the same rows as GL2C client read BW here.

  data source:

  # =========================================================================
  # Table 301: Instruction Cache (SQC)
  # =========================================================================
  - metric_table:
      id: 301
      title: "Instruction Cache"
      cli_style: mem_chart
      tui_style: mem_chart
      comparable: false
      header:
        metric: Metric
        value: Value
        unit: Unit
      metric:
        ICache Requests:
          value: SUM(SQC_ICACHE_REQ_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        ICache Utilization:
          value: 100 * SUM(SQC_ICACHE_BUSY_CYCLES_sum) / SUM(SQ_BUSY_CYCLES_sum)
          unit: Percent
        ICache Hit Rate:
          value: 100 * SUM(SQC_ICACHE_HITS_sum) / SUM(SQC_ICACHE_HITS_sum + SQC_ICACHE_MISSES_sum)
          unit: Percent
        ICache Miss Rate:
          value: 100 * SUM(SQC_ICACHE_MISSES_sum) / SUM(SQC_ICACHE_HITS_sum + SQC_ICACHE_MISSES_sum)
          unit: Percent
        ICache Request Stall Rate:
          value: 100 * SUM(SQC_ICACHE_INPUT_VALID_READYB_sum) / SUM(SQ_BUSY_CYCLES_sum)
          unit: Percent
        ICache-GL1 Read Bandwidth:
          value: 128 * SUM(SQC_TC_INST_REQ_sum) / (SUM(End_Timestamp - Start_Timestamp) / 1e9)
          unit: Bytes/s

  # =========================================================================
  # Table 302: Scalar Data Cache (SQC)
  # =========================================================================
  - metric_table:
      id: 302
      title: "Scalar Data Cache"
      cli_style: mem_chart
      tui_style: mem_chart
      comparable: false
      header:
        metric: Metric
        value: Value
        unit: Unit
      metric:
        Dcache Requests:
          value: SUM(SQC_DCACHE_REQ_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        Dcache Utilization:
          value: 100 * SUM(SQC_DCACHE_BUSY_CYCLES_sum) / SUM(SQ_BUSY_CYCLES_sum)
          unit: Percent
        Dcache Hit Rate:
          value: 100 * SUM(SQC_DCACHE_HITS_sum) / SUM(SQC_DCACHE_HITS_sum + SQC_DCACHE_MISSES_sum)
          unit: Percent
        Dcache Request Stall Rate:
          value: 100 * SUM(SQC_DCACHE_INPUT_VALID_READYB_sum) / SUM(SQ_BUSY_CYCLES_sum)
          unit: Percent
        Dcache-GL1 Read Bandwidth:
          value: 128 * SUM(SQC_TC_DATA_READ_REQ_sum) / (SUM(End_Timestamp - Start_Timestamp) / 1e9)
          unit: Bytes/s

  # =========================================================================
  # Table 303: TCP Cache (GL0 Vector Cache)
  # =========================================================================
  - metric_table:
      id: 303
      title: "TCP Cache (GL0 Vector Cache)"
      cli_style: mem_chart
      tui_style: mem_chart
      comparable: false
      header:
        metric: Metric
        value: Value
        unit: Unit
      metric:
        TCP Total Requests:
          value: SUM(TCP_REQ_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        TCP Read Requests:
          value: SUM(TCP_REQ_READ_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        TCP Write Requests:
          value: SUM(TCP_REQ_WRITE_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        # Counter not available: tcp_req_atomic_sum
        TCP Miss Requests:
          value: SUM(TCP_REQ_MISS_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        GL0 Cache Hit Rate (TCP Cache):
          value: 100 * SUM(TCP_REQ_sum - TCP_REQ_MISS_sum) / SUM(TCP_REQ_sum)
          unit: Percent
        GL0 Cache BW (TCP Cache):
          value: 64 * SUM(TCP_REQ_sum) / (SUM(End_Timestamp - Start_Timestamp) / 1e9)
          unit: Bytes/s

  # =========================================================================
  # Table 304: LDS (Local Data Share)
  # =========================================================================
  - metric_table:
      id: 304
      title: "LDS (Local Data Share)"
      cli_style: mem_chart
      tui_style: mem_chart
      comparable: false
      header:
        metric: Metric
        value: Value
        unit: Unit
      metric:
        LDS Instructions:
          value: SUM(SQ_INSTS_LDS_sum) / SUM($denom)
          unit: (Instructions + $normUnit)
        # Counters not available: sq_lds_direct_rd, sq_lds_direct_wr
        LDS Atomic Instructions:
          value: SUM(SQ_LDS_ATOMIC_RETURN_sum) / SUM($denom)
          unit: (Instructions + $normUnit)
        LDS Instruction Cycles:
          value: SUM(SQ_INST_CYCLES_LDS_sum) / SUM($denom)
          unit: (Cycles + $normUnit)
        LDS Wait Cycles:
          value: SUM(SQ_WAIT_INST_LDS_sum) / SUM($denom)
          unit: (Cycles + $normUnit)
        LDS Bank Conflict Rate:
          value: 100 * SUM(SQC_LDS_BANK_CONFLICT_sum) / SUM(SQC_LDS_IDX_ACTIVE_sum)
          unit: Percent
        LDS Estimated Bandwidth:
          value: 32 * 4 * SUM(SQC_LDS_IDX_ACTIVE_sum - SQC_LDS_BANK_CONFLICT_sum) / (SUM(End_Timestamp - Start_Timestamp) / 1e9)
          unit: Bytes/s

  # =========================================================================
  # Table 305: TCP-GL1 Interface
  # =========================================================================
  - metric_table:
      id: 305
      title: "TCP-GL1 Interface"
      cli_style: mem_chart
      tui_style: mem_chart
      comparable: false
      header:
        metric: Metric
        value: Value
        unit: Unit
      metric:
        TCP-GL1 Read Requests:
          value: SUM(TCP_GL1_REQ_READ_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        TCP-GL1 Write Requests:
          value: SUM(TCP_GL1_REQ_WRITE_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        TCP-GL1 Read Bandwidth:
          value: 64 * SUM(TCP_GL1_REQ_READ_sum) / (SUM(End_Timestamp - Start_Timestamp) / 1e9)
          unit: Bytes/s
        TCP-GL1 Write Bandwidth:
          value: 64 * SUM(TCP_GL1_REQ_WRITE_sum) / (SUM(End_Timestamp - Start_Timestamp) / 1e9)
          unit: Bytes/s

  # =========================================================================
  # Table 306: GL1 Cache (L1)
  # =========================================================================
  - metric_table:
      id: 306
      title: "GL1 Cache (L1)"
      cli_style: mem_chart
      tui_style: mem_chart
      comparable: false
      header:
        metric: Metric
        value: Value
        unit: Unit
      metric:
        GL1 Cache Utilization:
          value: 100 * SUM(GL1C_BUSY_sum) / SUM(GL1C_CYCLE_sum)
          unit: Percent
        GL1 Cache Total Requests:
          value: SUM(GL1C_REQ_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        GL1 Cache Read Requests:
          value: SUM(GL1C_REQ_READ_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        GL1 Cache Write Requests:
          value: SUM(GL1C_REQ_WRITE_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        GL1 Cache Miss Requests:
          value: SUM(GL1C_REQ_MISS_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        GL1 Cache Hit Rate:
          value: 100 * SUM(GL1C_REQ_sum - GL1C_REQ_MISS_sum) / SUM(GL1C_REQ_sum)
          unit: Percent
        GL1 Cache Starve Rate:
          value: 100 * SUM(GL1C_STARVE_sum) / SUM(GL1C_CYCLE_sum)
          unit: Percent
        GL1 Cache Stall GL2 Backpressure:
          value: 100 * SUM(GL1C_STALL_GL2_GL1_sum) / SUM(GL1C_BUSY_sum)
          unit: Percent

  # =========================================================================
  # Table 307: GL1-GL2 Interface
  # =========================================================================
  - metric_table:
      id: 307
      title: "GL1-GL2 Interface"
      cli_style: mem_chart
      tui_style: mem_chart
      comparable: false
      header:
        metric: Metric
        value: Value
        unit: Unit
      metric:
        GL1-GL2 Read Requests:
          value: SUM(GL1C_GL2_REQ_READ_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        GL1-GL2 Write Requests:
          value: SUM(GL1C_GL2_REQ_WRITE_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        GL1-GL2 Read Bandwidth:
          value: SUM(GL1C_GL2_REQ_READ_32B_sum*32 + GL1C_GL2_REQ_READ_64B_sum*64 + GL1C_GL2_REQ_READ_128B_sum*128) / (SUM(End_Timestamp - Start_Timestamp) / 1e9)
          unit: Bytes/s
        GL1-GL2 Write Bandwidth:
          value: SUM(GL1C_GL2_REQ_WRITE_32B_sum*32 + GL1C_GL2_REQ_WRITE_64B_sum*64) / (SUM(End_Timestamp - Start_Timestamp) / 1e9)
          unit: Bytes/s
        GL1-GL2 Read Latency:
          value: SUM(GL1C_GL2_REQ_READ_LATENCY_sum) / SUM(GL1C_GL2_REQ_READ_sum)
          unit: Cycles
        GL1-GL2 Write Latency:
          value: SUM(GL1C_GL2_REQ_WRITE_LATENCY_sum) / SUM(GL1C_GL2_REQ_WRITE_sum)
          unit: Cycles

  # =========================================================================
  # Table 308: GL2 Cache (L2)
  # =========================================================================
  - metric_table:
      id: 308
      title: "GL2 Cache (L2)"
      cli_style: mem_chart
      tui_style: mem_chart
      comparable: false
      header:
        metric: Metric
        value: Value
        unit: Unit
      metric:
        GL2 Cache Utilization:
          value: 100 * SUM(GL2C_BUSY_sum) / SUM(GL2C_CYCLE_sum)
          unit: Percent
        GL2 Cache Total Requests:
          value: SUM(GL2C_REQ_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        GL2 Cache Read Requests:
          value: SUM(GL2C_READ_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        GL2 Cache Write Requests:
          value: SUM(GL2C_WRITE_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        GL2 Cache Atomic Requests:
          value: SUM(GL2C_ATOMIC_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        GL2 Cache Hit Rate:
          value: 100 * SUM(GL2C_HIT_sum) / SUM(GL2C_HIT_sum + GL2C_MISS_sum)
          unit: Percent
        GL2 Cache Read BW:
          # 32/64/128 B read bins plus 96 B compressed reads; EA 96 B (GL2C_EA_RDREQ_96B) is fabric-side (see Speed-of-Light).
          value: SUM(GL2C_READ_32_REQ_sum*32 + GL2C_READ_64_REQ_sum*64 + GL2C_READ_128_REQ_sum*128 + GL2C_COMPRESSED_READ_96_REQ_sum*96) / (SUM(End_Timestamp - Start_Timestamp) / 1e9)
          unit: Bytes/s
        GL2 Cache Write BW:
          # Note: GL2C write requests can be 32B or 64B (no 128B writes documented).
          value: 64 * SUM(GL2C_WRITE_sum) / (SUM(End_Timestamp - Start_Timestamp) / 1e9)
          unit: Bytes/s

  # =========================================================================
  # Table 309: Graphics Core Efficiency Arbiter (GCEA) to system memory (APU)
  # =========================================================================
  - metric_table:
      id: 309
      title: "Graphics Core Efficiency Arbiter (GCEA) to System Memory"
      cli_style: mem_chart
      tui_style: mem_chart
      comparable: false
      header:
        metric: Metric
        value: Value
        unit: Unit
      metric:
        SARB Utilization:
          value: 100 * SUM(GCEA_SARB_BUSY_sum) / SUM(GCEA_ALWAYS_COUNT_sum)
          unit: Percent
        SARB Stall Rate:
          value: 100 * SUM(GCEA_SARB_STALLED_sum) / SUM(GCEA_ALWAYS_COUNT_sum)
          unit: Percent
        DRAM Read Requests:
          value: SUM(GCEA_RDRAM_REQ_PER_CLIGRP_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        DRAM Write Requests:
          value: SUM(GCEA_WDRAM_REQ_PER_CLIGRP_sum) / SUM($denom)
          unit: (Requests + $normUnit)
        DRAM Read Bandwidth:
          value: 32 * SUM(GCEA_RDRAM_SIZE_REQ_sum) / (SUM(End_Timestamp - Start_Timestamp) / 1e9)
          unit: Bytes/s
        DRAM Write Bandwidth:
          value: 32 * SUM(GCEA_WDRAM_SIZE_REQ_sum) / (SUM(End_Timestamp - Start_Timestamp) / 1e9)
          unit: Bytes/s
        Read Returns:
          value: SUM(GCEA_RRET_VLD_sum) / SUM($denom)
          unit: (Count + $normUnit)
        Write Returns:
          value: SUM(GCEA_WRET_VLD_sum) / SUM($denom)
          unit: (Count + $normUnit)

  metrics_description:
    ICache Utilization: >-
      Percentage of shader busy cycles spent actively servicing instruction fetch requests.
      High utilization indicates the instruction cache is keeping pace with shader execution.
      Low utilization may indicate instruction cache misses causing stalls, or idle shaders.
    ICache Hit Rate: >-
      Percentage of instruction cache accesses that are serviced from cache without fetching
      from the GL1 cache. High hit rates indicate good instruction locality. Low hit rates
      may indicate large kernels exceeding instruction cache capacity or divergent branches.
    ICache Miss Rate: >-
      Percentage of instruction cache accesses that miss and require fetching from the GL1
      cache. High miss rates increase instruction fetch latency and may cause shader stalls.
      Consider reducing kernel code size or improving branch coherence.
    Dcache Utilization: >-
      Percentage of shader busy cycles spent actively servicing scalar data cache requests.
      The scalar data cache holds uniform data accessed by scalar instructions. High
      utilization indicates active use of scalar memory operations.
    Dcache Hit Rate: >-
      Percentage of scalar data cache accesses that hit in cache. High hit rates indicate
      efficient reuse of constant and uniform data. Low hit rates may indicate excessive
      unique constant data or poor temporal locality.
    GL0 Cache Hit Rate (TCP Cache): >-
      Percentage of GL0 vector cache (TCP Cache) requests serviced from cache. TCP Cache is the
      first-level cache for vector memory operations. Higher hit rates reduce traffic
      to the GL1 cache and lower memory access latency for vector operations.
    LDS Atomic Instructions: >-
      Number of atomic operations executed on Local Data Share memory. Atomic operations
      provide thread-safe read-modify-write operations but may serialize if multiple
      work-items access the same address.
    LDS Bank Conflict Rate: >-
      Percentage of LDS accesses that experienced bank conflicts. Conflicts occur when
      multiple work-items in a wavefront access different addresses in the same LDS bank.
      High conflict rates reduce effective LDS bandwidth. Restructuring data layouts can help.
    LDS Estimated Bandwidth: >-
      Estimated achieved bandwidth for Local Data Share operations. This reflects the
      effective throughput after accounting for bank conflicts. RDNA 3.5 provides 32 LDS
      banks per compute unit for high-bandwidth shared memory access.
    GL1 Cache Utilization: >-
      Percentage of cycles the GL1 cache is actively processing requests. GL1 cache is
      shared across multiple workgroup processors within a shader engine. High utilization
      indicates active memory traffic through the GL1 cache.
    GL1 Cache Hit Rate: >-
      Percentage of L1 cache requests that hit in cache. Higher hit rates reduce traffic
      to the L2 cache and improve memory access latency. Low hit rates may indicate poor
      data locality or working sets exceeding L1 capacity.
    GL2 Cache Hit Rate: >-
      Percentage of L2 cache requests that hit in cache. GL2 cache is the GPU's final
      on-chip cache before accessing system memory via GCEA. High hit rates reduce memory
      bandwidth pressure. Low hit rates cause traffic to system memory, increasing latency.
    SARB Utilization: >-
      Percentage of cycles the System Arbiter is actively processing memory requests.
      The arbiter handles traffic between the GPU caches and system memory interface.
      High utilization indicates significant off-chip memory activity.
    DRAM Read Bandwidth: >-
      Achieved read bandwidth to system memory. RDNA 3.5 APUs use DDR5/LPDDR5 system
      memory. High read bandwidth indicates memory-intensive read patterns. This is
      a key metric for identifying memory-bound workloads.
    DRAM Write Bandwidth: >-
      Achieved write bandwidth to system memory. High write bandwidth indicates
      write-intensive workloads. Combined with read bandwidth, this shows total
      memory traffic between the GPU and system memory.
