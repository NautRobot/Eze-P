# =============================================================================
# RDNA3.5 (gfx115x) - RDNA3.5 Roofline Performance Metrics
# =============================================================================
# RDNA 3.5: VALU FLOP roofline from SQ_INSTS_VALU*; WMMA (separate ISA) is not a dedicated row.
# Cache hierarchy: TCP Cache (GL0) -> GL1 Cache -> GL2 Cache -> System Memory
# =============================================================================

Panel Config:
  id: 400
  title: Roofline
  data source:
  - metric_table:
      id: 401
      title: Roofline Performance Rates
      cli_style: Roofline
      tui_style: Roofline
      header:
        metric: Metric
        value: Value
        unit: Unit
        peak: Peak (Empirical)
      metric:
        # Note: RDNA 3.5 counters cannot differentiate FP16/FP32; uses aggregate VALU counter.
        VALU FLOPs:
          value: SUM($wave_size * SQ_INSTS_VALU_sum) / SUM(End_Timestamp - Start_Timestamp)
          unit: GFLOP/s
          peak: $FP32Flops_empirical_peak
        VALU FLOPs (F64):
          value: SUM($wave_size * SQ_INSTS_VALU_DP_sum) / SUM(End_Timestamp - Start_Timestamp)
          unit: GFLOP/s
          peak: ((($max_sclk * $cu_per_gpu) * ($simd_per_cu * $wave_size * 2) / 32) / 1000)
        GL2 Cache BW:
          # Note: GL1C-GL2 reads can be 32B, 64B, or 128B. Writes can be 32B or 64B.
          value: SUM(GL1C_GL2_REQ_READ_32B_sum*32 + GL1C_GL2_REQ_READ_64B_sum*64 + GL1C_GL2_REQ_READ_128B_sum*128 + GL1C_GL2_REQ_WRITE_32B_sum*32 + GL1C_GL2_REQ_WRITE_64B_sum*64) / SUM((End_Timestamp - Start_Timestamp) / 1e9)
          unit: Bytes/s
          peak: ($L2Bw_empirical_peak * 1e9)
        GL1 Cache BW:
          value: SUM(TCP_GL1_REQ_READ_sum * 64 + TCP_GL1_REQ_WRITE_sum * 64) / SUM((End_Timestamp - Start_Timestamp) / 1e9)
          unit: Bytes/s
          peak: ($L1Bw_empirical_peak * 1e9)
        GL0 Cache BW (TCP Cache):
          value: SUM(TCP_REQ_sum * 64) / SUM((End_Timestamp - Start_Timestamp) / 1e9)
          unit: Bytes/s
          peak: ($L0Bw_empirical_peak * 1e9)
        LDS BW:
          value: SUM((SQC_LDS_IDX_ACTIVE_sum - SQC_LDS_BANK_CONFLICT_sum) * 4 * $lds_banks_per_cu) / SUM((End_Timestamp - Start_Timestamp) / 1e9)
          unit: Bytes/s
          peak: ($LDSBw_empirical_peak * 1e9)

  - metric_table:
      id: 402
      title: Roofline Plot Points
      cli_style: Roofline
      tui_style: Roofline
      header:
        metric: Metric
        value: Value
        unit: Unit
      metric:
        AI L2:
          # Note: GL1-GL2 reads can be 32B, 64B, or 128B. Writes can be 32B or 64B.
          value: ( SUM($wave_size * SQ_INSTS_VALU_sum) / SUM((GL1C_GL2_REQ_READ_32B_sum*32 + GL1C_GL2_REQ_READ_64B_sum*64 + GL1C_GL2_REQ_READ_128B_sum*128) + (GL1C_GL2_REQ_WRITE_32B_sum*32 + GL1C_GL2_REQ_WRITE_64B_sum*64)) )
          unit: FLOPs/Byte
        AI L1:
          value: ( SUM($wave_size * SQ_INSTS_VALU_sum) / SUM(TCP_REQ_sum * 64) )
          unit: FLOPs/Byte
        Performance (GFLOPs):
          value: ( SUM($wave_size * SQ_INSTS_VALU_sum) / (SUM(End_Timestamp - Start_Timestamp) / 1e9) ) / 1e9
          unit: GFLOP/s

  metrics_description:
    VALU FLOPs: >-
      Floating-point operations per second on the VALU. Peak is based on
      FP32 FMA single-issue (128 FLOPs/CU/cycle). VOPD dual-issue doubles
      throughput: FP32 to 256, FP16 packed to 512 FLOPs/CU/cycle. Uses
      aggregate instruction counter.
    VALU FLOPs (F64): >-
      64-bit floating-point operations per second on the VALU. Peak is
      4 FLOPs/CU/cycle (FP32 FMA rate / 32). Uses dedicated FP64 instruction
      counter (SQ_INSTS_VALU_DP_sum). FP64 is 1/32 rate of FP32 on RDNA.
    GL2 Cache BW: >-
      Achieved bandwidth between the GL1 and GL2 caches. This represents GL1 miss traffic
      that must be serviced by GL2. High bandwidth relative to peak may indicate
      GL1 cache pressure or poor data locality at the GL1 level.
    GL1 Cache BW: >-
      Achieved bandwidth between the GL0 (TCP Cache) and GL1 caches. This represents
      GL0 miss traffic. High bandwidth relative to peak may indicate cache pressure
      at the GL0 level or memory access patterns with poor locality.
    GL0 Cache BW (TCP Cache): >-
      Achieved bandwidth at the GL0 vector cache (TCP Cache). This represents total data
      requested by shader cores from the memory hierarchy. Compare against peak to
      assess memory subsystem utilization.
    LDS BW: >-
      Achieved bandwidth for Local Data Share memory operations. LDS provides
      high-bandwidth, low-latency shared memory within a workgroup. Compare against
      peak to identify if LDS bandwidth is limiting performance.
    AI L2: >-
      Arithmetic Intensity relative to the L2 cache. This metric shows compute
      density relative to L2 cache traffic. Higher values indicate better data
      reuse upstream of L2, while lower values suggest heavy traffic into L2.
    AI L1: >-
      Arithmetic Intensity relative to the L1 cache (TCP). Higher values indicate
      more compute operations per byte of data loaded, suggesting compute-bound
      behavior. Lower values suggest memory-bound behavior limited by L1 bandwidth.
    Performance (GFLOPs): >-
      Achieved compute throughput measured in billions of floating-point operations
      per second. This value, combined with arithmetic intensity, determines the
      kernel's position on the roofline chart for performance analysis.
