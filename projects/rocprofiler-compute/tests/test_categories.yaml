test_categories:
  quick:
    description: "Fast sanity checks - Run pre-commit (target: < 5 min)"
    test_patterns:
      - test_profile_misc
      - test_metric_utils
      - test_parser
      - test_argparser
      - test_profile_section
      - test_pc_sampling
      - test_analyze_workloads
