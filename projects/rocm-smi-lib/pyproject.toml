[tool.ruff]
line-length = 100

extend-exclude = [
    "build",
    "build-*",
    "_build",
    "docs",
    "python_smi_tools/rsmiBindingsInit.py",
    "third_party",
]

[tool.ruff.lint]
select = ["E", "W", "F", "I"]
ignore = ["E501", "F403", "F405"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = true
line-ending = "auto"
