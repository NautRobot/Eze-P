# pytest.ini
[pytest]
markers =
    ir_device: marks tests that exercise librccl_device.bc via IR_test
    peer_pointer: ncclGetPeerPointerTeam tests
    coop: ncclCoopAny init/accessor/sync tests
    lsa_barrier: ncclLsaBarrierSession tests
    gin_barrier: ncclGinBarrierSession tests
    composite_barrier: composite ncclBarrierSession tests
    mpi: multi-rank tests launched under mpirun (need host librccl.so + MPI)

testpaths = tests
addopts = --import-mode=importlib
