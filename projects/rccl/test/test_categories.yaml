# RCCL CTest categories (shared/ctest schema).
# RCCL does not support Windows: exclude_windows matches all tests so generated suites are empty on Windows.
#
# Integrate with: include(${ROCM_LIBRARIES_ROOT}/shared/ctest/TestCategories.cmake)
#   apply_test_category_labels(rccl-UnitTests "${CMAKE_CURRENT_SOURCE_DIR}/test_categories.yaml" ...)

test_categories:
  smoke:
    description: "RCCL CI smoke tests."
    test_patterns: 
      - "AllReduce.OutOfPlace" # "ROCTX" row uses test_filter AllReduce.OutOfPlace with env RCCL_LOG_ROCTX=1 UT_MAX_GPUS=2 UT_PROCESS_MASK=2
      - "AllReduce.OutOfPlaceGraph"
      - "AllReduce.InPlace"
      - "AllReduce.InPlaceGraph"
      - "AllReduce.ManagedMem"
      - "AllReduce.Channels"
      - "AllReduce.ManagedMemGraph"
      - "AllReduce.PreMultScalar"
      - "AllReduce.UserBufferRegistration"
      - "AllReduce.ManagedMemUserBufferRegistration"
      - "AllGather.OutOfPlace"
      - "AllGather.OutOfPlaceGraph"
      - "AllGather.InPlace"
      - "AllGather.InPlaceGraph"
      - "AllGather.ManagedMem"
      - "AllGather.ManagedMemGraph"
      - "AllGather.UserBufferRegistration"
      - "AllGather.ManagedMemUserBufferRegistration"
      - "AllToAll.OutOfPlace"
      - "AllToAll.OutOfPlaceGraph"
      - "AllToAll.ManagedMem"
      - "AllToAll.ManagedMemGraph"
      - "AllToAllv.OutOfPlace"
      - "AllToAllv.OutOfPlaceGraph"
      - "Broadcast.OutOfPlace"
      - "Broadcast.OutOfPlaceGraph"
      - "Broadcast.InPlace"
      - "Broadcast.InPlaceGraph"
      - "Broadcast.ManagedMem"
      - "Broadcast.ManagedMemGraph"
      - "Gather.OutOfPlace"
      - "Gather.OutOfPlaceGraph"
      - "Gather.InPlace"
      - "Gather.InPlaceGraph"
      - "Gather.ManagedMem"
      - "Gather.ManagedMemGraph"
      - "Scatter.OutOfPlace"
      - "Scatter.OutOfPlaceGraph"
      - "Scatter.InPlace"
      - "Scatter.InPlaceGraph"
      - "Scatter.ManagedMem"
      - "Scatter.ManagedMemGraph"
      - "Reduce.OutOfPlace"
      - "Reduce.OutOfPlaceGraph"
      - "Reduce.InPlace"
      - "Reduce.InPlaceGraph"
      - "Reduce.ManagedMem"
      - "Reduce.ManagedMemGraph"
      - "ReduceScatter.OutOfPlace"
      - "ReduceScatter.OutOfPlaceGraph"
      - "ReduceScatter.InPlace"
      - "ReduceScatter.InPlaceGraph"
      - "ReduceScatter.ManagedMem"
