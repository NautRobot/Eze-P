      - "ProxyTests.*"
      - "Rcclwrap.*"
      - "TransportTest.*"
      - "ArgCheck.*"
      - "ALIGN_*:DIVUP:ROUNDUP:u32fp*:*Hash"
      - "AltRsmi.*"
      - "NetSocket.*"
      - "Ipcsocket.*"
      - "Standalone.SplitComms_RankCheck"
