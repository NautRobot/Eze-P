version: 2
updates:

  # Check for updates to GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "projects/aqlprofile/docs/sphinx" # Location of package manifests
    open-pull-requests-limit: 5
    schedule:
      interval: "weekly"
    groups:
      aqlprofile-docs-dependencies:
        patterns:
          - "*"

