name: rocprofiler-systems Ubuntu 22.04 (GCC, Python, ROCm)
run-name: ubuntu-jammy

on:
  push:
    branches:
      - develop
    paths:
      - '.github/workflows/rocprofiler-systems-ubuntu-jammy.yml'
      - 'projects/rocprofiler-systems/**'
      - '!**/*.md'
      - '!**/*.rtf'
      - '!**/*.rst'
      - '!**/.markdownlint-ci2.yaml'
      - '!**/.readthedocs.yaml'
      - '!**/.spellcheck.local.yaml'
      - '!**/.wordlist.txt'
      - '!projects/rocprofiler-systems/docs/**'
      - '!projects/rocprofiler-systems/source/docs/**'
      - '!projects/rocprofiler-systems/source/python/gui/**'
      - '!projects/rocprofiler-systems/docker/**'
      - '!projects/rocprofiler-systems/CMakePresets.json'
  pull_request:
    paths:
      - '.github/workflows/rocprofiler-systems-ubuntu-jammy.yml'
      - 'projects/rocprofiler-systems/**'
      - '!**/*.md'
      - '!**/*.rtf'
      - '!**/*.rst'
      - '!**/.markdownlint-ci2.yaml'
      - '!**/.readthedocs.yaml'
      - '!**/.spellcheck.local.yaml'
      - '!**/.wordlist.txt'
      - '!projects/rocprofiler-systems/docs/**'
      - '!projects/rocprofiler-systems/source/docs/**'
      - '!projects/rocprofiler-systems/source/python/gui/**'
      - '!projects/rocprofiler-systems/docker/**'
      - '!projects/rocprofiler-systems/CMakePresets.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ROCPROFSYS_CI: ON
  ROCPROFSYS_TMPDIR: "%env{PWD}%/testing-tmp"

jobs:
  ubuntu-jammy:
    runs-on: ubuntu-latest
    container:
      image: dgaliffiamd/rocprofiler-systems:ci-rocm-${{ matrix.rocm-version }}-ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        compiler: ['g++']
        rocm: ['ON']
        python: ['ON']
        strip: ['OFF']
        hidden: ['ON']
        build-type: ['Release']
        build-dyninst: ['ON']
        rocm-version: ['6.3', '6.4', '7.0', '7.1', '7.2']

    env:
      OMPI_ALLOW_RUN_AS_ROOT: 1
      OMPI_ALLOW_RUN_AS_ROOT_CONFIRM: 1
      ROCPROFSYS_CI: 'ON'
      ROCPROFSYS_MAX_THREADS: '64'
      ROCPROFSYS_KEEP_TEST_OUTPUT: '0'
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
    - &sparse-checkout
      uses: actions/checkout@v6
      with:
        sparse-checkout: |
          projects/rocprofiler-systems/
          .gitmodules

    - name: Configure ROCm Environment
      shell: bash
      run: |
        echo "/opt/rocm/bin" >> $GITHUB_PATH
        echo "ROCM_PATH=/opt/rocm" >> $GITHUB_ENV
        echo "LD_LIBRARY_PATH=/opt/rocm/lib:${LD_LIBRARY_PATH}" >> $GITHUB_ENV

    - name: Install Packages
      timeout-minutes: 25
      uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 #v4.0.0
      with:
        retry_wait_seconds: 30
        timeout_minutes: 25
        max_attempts: 5
        command: |
          cd projects/rocprofiler-systems/
          apt-get update &&
          apt-get upgrade -y &&
          apt-get install -y ${{ matrix.compiler }} &&
          apt-get autoclean

    - name: Restore ccache
      uses: actions/cache@v6
      with:
        path: ${{ github.workspace }}/.ccache
        key: ccache-ubuntu-jammy-${{ github.job }}-${{ matrix.compiler }}-${{ matrix.rocm-version }}-${{ matrix.build-type }}-${{ github.sha }}
        restore-keys: |
          ccache-ubuntu-jammy-${{ github.job }}-${{ matrix.compiler }}-${{ matrix.rocm-version }}-${{ matrix.build-type }}-
          ccache-ubuntu-jammy-${{ github.job }}-${{ matrix.compiler }}-${{ matrix.rocm-version }}-

    - &configure-ccache
      name: Configure ccache
      run: |
        mkdir -p "${CCACHE_DIR}"
        ccache --max-size=1G
        ccache --set-config=sloppiness=time_macros,include_file_mtime,include_file_ctime,pch_defines
        ccache -z
        ccache -p | head -20

    - name: Install Python Test Dependencies
      timeout-minutes: 10
      shell: bash
      working-directory: projects/rocprofiler-systems/
      run: |
        for env_dir in /opt/conda/envs/py3.{8,9,10,11}/; do
          if [ -d "${env_dir}" ] && [ -x "${env_dir}bin/python3" ]; then
            echo "Installing requirements into ${env_dir}"
            "${env_dir}bin/python3" -m pip install -r requirements.txt
          fi
        done

    - name: Sanity Check ROCm
      shell: bash
      working-directory: projects/rocprofiler-systems/
      run: |
        /opt/rocm/bin/hipcc -O3 -c ./examples/transpose/transpose.cpp -o /tmp/transpose.o

    - name: Test Environment Modules
      timeout-minutes: 15
      shell: bash
      working-directory: projects/rocprofiler-systems/
      run: |
        set -v
        source /usr/share/modules/init/$(basename ${SHELL})
        module avail

    - name: Configure Env
      working-directory: projects/rocprofiler-systems/
      run: |
        echo "CC=$(echo '${{ matrix.compiler }}' | sed 's/+/c/g')" >> $GITHUB_ENV
        echo "CXX=${{ matrix.compiler }}" >> $GITHUB_ENV

    - name: Configure, Build, and Test
      timeout-minutes: 115
      shell: bash
      working-directory: projects/rocprofiler-systems/
      env:
        CMAKE_C_COMPILER_LAUNCHER: ccache
        CMAKE_CXX_COMPILER_LAUNCHER: ccache
      run: |
        git config --global --add safe.directory ${GITHUB_WORKSPACE}
        git config --global --add safe.directory ${PWD}
        echo "CMake version: $(cmake --version | head -n 1)"
        echo "Compiler version: $(${{ matrix.compiler }} --version | head -n 1)"
        echo "ROCm version: ${{ matrix.rocm-version }}"
        TAG=""
        append-tagname() { if [ "${1}" == "ON" ]; then TAG="${TAG}-${2}"; fi; }
        append-tagname ${{ matrix.rocm }} rocm-${{ matrix.rocm-version }}
        append-tagname ${{ matrix.python }} python
        append-tagname ${{ matrix.build-dyninst }} internal-dyninst
        append-tagname ${{ matrix.strip }} strip
        append-tagname ${{ matrix.hidden }} hidden-viz
        python3 ./scripts/run-ci.py -B build \
          --name ${{ github.repository_owner }}-${{ github.ref_name }}-ubuntu-jammy-${{ matrix.compiler }}${TAG} \
          --build-jobs $(nproc) \
          --site GitHub \
          -- \
          -DCMAKE_C_COMPILER=$(echo '${{ matrix.compiler }}' | sed 's/+/c/g') \
          -DCMAKE_CXX_COMPILER=${{ matrix.compiler }} \
          -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
          -DCMAKE_INSTALL_PREFIX=/opt/rocprofiler-systems-dev \
          -DROCPROFSYS_BUILD_EXAMPLES=ON \
          -DROCPROFSYS_BUILD_TESTING=ON \
          -DROCPROFSYS_USE_PYTHON=${{ matrix.python }} \
          -DROCPROFSYS_BUILD_DYNINST=${{ matrix.build-dyninst }} \
          -DROCPROFSYS_BUILD_TBB=${{ matrix.build-dyninst }} \
          -DROCPROFSYS_BUILD_ELFUTILS=${{ matrix.build-dyninst }} \
          -DROCPROFSYS_BUILD_LIBIBERTY=${{ matrix.build-dyninst }} \
          -DROCPROFSYS_BUILD_HIDDEN_VISIBILITY=${{ matrix.hidden }} \
          -DROCPROFSYS_PYTHON_PREFIX=/opt/conda/envs \
          -DROCPROFSYS_PYTHON_ENVS="py3.8;py3.9;py3.10;py3.11" \
          -DROCPROFSYS_STRIP_LIBRARIES=${{ matrix.strip }} \
          -DROCPROFSYS_MAX_THREADS=64 \
          -DROCPROFSYS_DISABLE_EXAMPLES="transpose;rccl;openmp-target;openmp-vv;videodecode;jpegdecode;network" \
          -DROCPROFSYS_BUILD_NUMBER=${{ github.run_attempt }} \
          -DUSE_CLANG_OMP=OFF \
          -- \
          -LE "network|gpu"

    - &ccache-stats
      name: ccache stats
      if: always()
      run: |
        echo "=== ccache stats ==="
        ccache -s -v || true
        echo "=== ccache dir size ==="
        du -sh "${CCACHE_DIR}" || true

    - name: Check for Leftover Buffered Files
      timeout-minutes: 5
      working-directory: projects/rocprofiler-systems/
      run: |
        set -v
        if find /tmp -maxdepth 1 -name 'buffered*' -print -quit | grep -q .; then
          echo "Error: Found leftover buffered storage files in /tmp:"
          ls -lh /tmp/buffered*
          exit 1
        else
          echo "✓ No buffered storage files found in /tmp"
        fi


    - name: Install
      timeout-minutes: 10
      working-directory: projects/rocprofiler-systems/
      run: |
        cmake --build build --target install --parallel $(nproc)
        rm -fr /opt/rocprofiler-systems-dev/

    - name: CPack and Install
      working-directory: projects/rocprofiler-systems/
      run: |
        cd build
        cpack -G STGZ
        mkdir -p /opt/rocprofiler-systems
        ./rocprofiler-systems-*.sh --prefix=/opt/rocprofiler-systems --exclude-subdir --skip-license

    - name: Test Install with Modulefile
      timeout-minutes: 15
      shell: bash
      working-directory: projects/rocprofiler-systems/
      run: |
        set -v
        source /usr/share/modules/init/$(basename ${SHELL})
        module use /opt/rocprofiler-systems/share/modulefiles
        module avail
        module load rocprofiler-systems
        ./scripts/test-install.sh --test-rocprof-sys-{instrument,avail,sample,python,rewrite,runtime}=1

    - name: Test User API
      timeout-minutes: 10
      working-directory: projects/rocprofiler-systems/
      run: |
        set -v
        ./scripts/test-find-package.sh --install-dir /opt/rocprofiler-systems

    - name: CTest Artifacts
      if: failure()
      continue-on-error: True
      uses: actions/upload-artifact@v7
      with:
        name: ctest-${{ github.job }}-${{ strategy.job-index }}-log
        path: |
          projects/rocprofiler-systems/build/*.log

    - name: Data Artifacts
      if: failure()
      continue-on-error: True
      uses: actions/upload-artifact@v7
      with:
        name: data-${{ github.job }}-${{ strategy.job-index }}-files
        path: |
          projects/rocprofiler-systems/build/rocprofsys-tests-config/*.cfg
          projects/rocprofiler-systems/build/rocprofsys-tests-output/**/*.txt
          projects/rocprofiler-systems/build/rocprofsys-tests-output/**/*-instr*.json

  ubuntu-jammy-system-deps:
    runs-on: ubuntu-latest
    container:
      image: dgaliffiamd/rocprofiler-systems:ci-rocm-7.2-ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        compiler: ['g++', 'amdclang++']
        include:
          - compiler: 'g++'
            cc: 'gcc'
            use-clang-omp: 'OFF'
          - compiler: 'amdclang++'
            cc: 'amdclang'
            use-clang-omp: 'ON'

    env:
      OMPI_ALLOW_RUN_AS_ROOT: 1
      OMPI_ALLOW_RUN_AS_ROOT_CONFIRM: 1
      ROCPROFSYS_CI: 'ON'
      ROCPROFSYS_MAX_THREADS: '64'
      ROCPROFSYS_KEEP_TEST_OUTPUT: '0'
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
    - *sparse-checkout

    - name: Configure ROCm Environment
      shell: bash
      run: |
        echo "/opt/rocm/bin" >> $GITHUB_PATH
        echo "ROCM_PATH=/opt/rocm" >> $GITHUB_ENV
        echo "LD_LIBRARY_PATH=/opt/rocm/lib:${LD_LIBRARY_PATH}" >> $GITHUB_ENV

    - name: Install System Dependency Packages
      timeout-minutes: 25
      uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 #v4.0.0
      with:
        retry_wait_seconds: 30
        timeout_minutes: 25
        max_attempts: 5
        command: |
          cd projects/rocprofiler-systems/
          apt-get update &&
          apt-get upgrade -y &&
          apt-get install -y g++ \
            binutils-dev libboost-all-dev libtbb-dev \
            libdw-dev libdwarf-dev libelf-dev libiberty-dev &&
          apt-get autoclean

    - name: Restore ccache
      uses: actions/cache@v6
      with:
        path: ${{ github.workspace }}/.ccache
        key: ccache-ubuntu-jammy-system-deps-${{ github.job }}-${{ matrix.compiler }}-${{ github.sha }}
        restore-keys: |
          ccache-ubuntu-jammy-system-deps-${{ github.job }}-${{ matrix.compiler }}-

    - *configure-ccache

    - name: Install Python Test Dependencies
      timeout-minutes: 10
      shell: bash
      working-directory: projects/rocprofiler-systems/
      run: |
        python3 -m pip install -r requirements.txt
        for env_dir in /opt/conda/envs/py3.{8,9,10,11}/; do
          if [ -d "${env_dir}" ] && [ -x "${env_dir}bin/python3" ]; then
            echo "Installing requirements into ${env_dir}"
            "${env_dir}bin/python3" -m pip install -r requirements.txt
          fi
        done

    - name: Sanity Check ROCm
      shell: bash
      working-directory: projects/rocprofiler-systems/
      run: |
        /opt/rocm/bin/hipcc -O3 -c ./examples/transpose/transpose.cpp -o /tmp/transpose.o

    - name: Configure, Build, and Test with System Dependencies
      timeout-minutes: 115
      shell: bash
      working-directory: projects/rocprofiler-systems/
      env:
        CMAKE_C_COMPILER_LAUNCHER: ccache
        CMAKE_CXX_COMPILER_LAUNCHER: ccache
      run: |
        git config --global --add safe.directory ${GITHUB_WORKSPACE}
        git config --global --add safe.directory ${PWD}
        echo "CMake version: $(cmake --version | head -n 1)"
        echo "Compiler version: $(${{ matrix.compiler }} --version | head -n 1)"
        echo "ROCm version: 7.2"
        echo "Testing build with SYSTEM dependencies (ROCPROFSYS_BUILD_*=OFF)"
        python3 ./scripts/run-ci.py -B build \
          --name ${{ github.repository_owner }}-${{ github.ref_name }}-ubuntu-jammy-system-deps-${{ matrix.compiler }} \
          --build-jobs $(nproc) \
          --site GitHub \
          -- \
          -DCMAKE_C_COMPILER=${{ matrix.cc }} \
          -DCMAKE_CXX_COMPILER=${{ matrix.compiler }} \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/opt/rocprofiler-systems-dev \
          -DROCPROFSYS_BUILD_EXAMPLES=ON \
          -DROCPROFSYS_BUILD_TESTING=ON \
          -DROCPROFSYS_USE_PYTHON=ON \
          -DROCPROFSYS_BUILD_DYNINST=ON \
          -DROCPROFSYS_BUILD_TBB=OFF \
          -DROCPROFSYS_BUILD_ELFUTILS=OFF \
          -DROCPROFSYS_BUILD_LIBIBERTY=OFF \
          -DROCPROFSYS_BUILD_HIDDEN_VISIBILITY=ON \
          -DROCPROFSYS_PYTHON_PREFIX=/opt/conda/envs \
          -DROCPROFSYS_PYTHON_ENVS="py3.8;py3.9;py3.10;py3.11" \
          -DROCPROFSYS_STRIP_LIBRARIES=OFF \
          -DROCPROFSYS_MAX_THREADS=64 \
          -DROCPROFSYS_DISABLE_EXAMPLES="transpose;rccl;openmp-target;openmp-vv;videodecode;jpegdecode;network" \
          -DROCPROFSYS_BUILD_NUMBER=${{ github.run_attempt }} \
          -DUSE_CLANG_OMP=${{ matrix.use-clang-omp }} \
          -- \
          -LE "network|gpu"

    - *ccache-stats

    - name: Install
      timeout-minutes: 10
      working-directory: projects/rocprofiler-systems/
      run: |
        cmake --install build --prefix /opt/rocprofiler-systems

    - name: Test Install with Modulefile
      timeout-minutes: 15
      shell: bash
      working-directory: projects/rocprofiler-systems/
      run: |
        set -v
        source /usr/share/modules/init/$(basename ${SHELL})
        module use /opt/rocprofiler-systems/share/modulefiles
        module avail
        module load rocprofiler-systems
        ./scripts/test-install.sh --test-rocprof-sys-{instrument,avail,sample,python,rewrite,runtime}=1

    - name: CTest Artifacts
      if: failure()
      continue-on-error: True
      uses: actions/upload-artifact@v7
      with:
        name: ctest-${{ github.job }}-${{ strategy.job-index }}-log
        path: |
          projects/rocprofiler-systems/build/*.log

    - name: Data Artifacts
      if: failure()
      continue-on-error: True
      uses: actions/upload-artifact@v7
      with:
        name: data-${{ github.job }}-${{ strategy.job-index }}-files
        path: |
          projects/rocprofiler-systems/build/rocprofsys-tests-config/*.cfg
          projects/rocprofiler-systems/build/rocprofsys-tests-output/**/*.txt
          projects/rocprofiler-systems/build/rocprofsys-tests-output/**/*-instr*.json
