# Pytest corpus checks for emulation/rocjitsu/.
#
# Fast smoke tests for rocjitsu. This is likely going to be added to TheRock
# tests, but it is currently a stopgap solution. It allows developers to
# quickly check that their changes to rocjitsu didn't break gfx1250 emulation.
name: "rocjitsu-test-corpus"

on:
  pull_request:
    paths:
      - "emulation/rocjitsu/**"
      - ".github/workflows/rocjitsu-*.yml"
  push:
    branches:
      - main
    paths:
      - "emulation/rocjitsu/**"
      - ".github/workflows/rocjitsu-*.yml"
  workflow_dispatch:
    inputs:
      corpus_repository:
        description: "Repository containing the rocjitsu pytest corpus"
        default: "ROCm/rocjitsu-test-corpus"
        required: true
      corpus_ref:
        description: "Branch, tag, or SHA to check out from the corpus repository"
        # Last updated on 2026/06/26.
        default: "9661a80073abfff688fda5a970bfa9de24de2ead"
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  ROCJITSU_SOURCE_DIR: ${{ github.workspace }}/rocm-systems/emulation/rocjitsu
  ROCJITSU_BUILD_DIR: ${{ github.workspace }}/build
  ROCJITSU_CORPUS_DIR: ${{ github.workspace }}/rocjitsu-test-corpus

jobs:
  test:
    runs-on: azure-linux-scale-rocm
    name: test (${{ matrix.name }})
    container:
      image: ghcr.io/rocm/no_rocm_image_ubuntu24_04@sha256:4150afe4759d14822f0e3f8930e1124f26e11f68b5c7b91ec9a02b20b1ebbb98
      options: --user 0:0
      env:
        DEBIAN_FRONTEND: noninteractive
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: release
            build_type: Release
            enable_asan: 0
            enable_ubsan: 0
            enable_tsan: 0
            enable_msan: 0
          - name: asan-ubsan
            build_type: RelWithDebInfo
            enable_asan: 1
            enable_ubsan: 1
            enable_tsan: 0
            enable_msan: 0
          - name: asan-ubsan-gcc
            build_type: RelWithDebInfo
            enable_asan: 1
            enable_ubsan: 1
            enable_tsan: 0
            enable_msan: 0
            c_compiler: gcc
            cxx_compiler: g++

    steps:
      - name: Install base dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            cmake \
            git \
            libdrm-dev \
            ninja-build \
            clang

      - name: Checkout rocm-systems
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: rocm-systems
          sparse-checkout: |
            emulation/rocjitsu
            .github
            shared/machine-readable-isa/isa

      - name: Checkout rocjitsu corpus
        if: matrix.name == 'release'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ github.event.inputs.corpus_repository || 'ROCm/rocjitsu-test-corpus' }}
          # Last updated on 2026/06/26.
          ref: 9661a80073abfff688fda5a970bfa9de24de2ead
          path: rocjitsu-test-corpus

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install ROCm SDK
        run: |
          python -m pip install --upgrade pip
          python -m pip install --pre \
            --index-url https://rocm.nightlies.amd.com/whl-multi-arch/ \
            "rocm[devel,libraries]==7.14.0a20260624"
          ROCM_LIB="$(rocm-sdk path --root)"/lib
          echo "LD_LIBRARY_PATH=${ROCM_LIB}:${LD_LIBRARY_PATH:-}" >> "${GITHUB_ENV}"

      - name: Build rocjitsu
        working-directory: ${{ env.ROCJITSU_SOURCE_DIR }}
        shell: bash
        run: |
          ROCMINFO=RocminfoTest
          ROCBLAS_GEMM=RocblasGemmTest
          RCCL_DAEMON=RcclDaemonTest
          ROCBLAS_GEMMS=RocblasGemmTest
          ROCBLAS_GEMM_FUZZ=RocblasGemmFuzz
          ROCBLAS_GEMM_CDNA3=RocblasGemmCdna3
          EXCLUDED_TESTS="${ROCMINFO}|${ROCBLAS_GEMM}|${RCCL_DAEMON}|${ROCBLAS_GEMMS}|${ROCBLAS_GEMM_FUZZ}|${ROCBLAS_GEMM_CDNA3}"
          ASAN_UBSAN_EXCLUDED_TESTS=(
            "HsaTest\.InitSucceeded"
            "HsaTest\.GpuAgentFound"
            "HipMemcpyTest\.RoundTripFloat"
            "HipMemcpyTest\.RoundTripInt"
            "HipMemcpyTest\.DeviceToDevice"
            "HipVectorAddTest\.CorrectResult"
            "DaemonTest\.HipVectorAdd"
            "DaemonTest\.HipMemcpyRoundTripFloat"
            "DaemonTest\.HipMemcpyRoundTripInt"
            "DaemonTest\.HipMemcpyDeviceToDevice"
            "DaemonTest\.TwoIndependentClients"
            "BfeRegressionTest\.ThreadIdxY"
            "LoggingTest\.dispatch_logged"
            "ProfiledPluginTest\.hook_profile_output"
            "CvtNarrow\.AllTests"
            "RaceTest\.vgpr_waitcnt"
            "RaceTest\.vgpr_waitcnt_race"
            "RaceTest\.sgpr_waitcnt"
            "RaceTest\.sgpr_waitcnt_race"
            "RaceTest\.lds_cross_wave"
            "RaceTest\.lds_cross_wave_race"
            "RaceTest\.global_to_lds_buffer"
            "RaceTest\.global_to_lds_buffer_race"
            "RaceTest\.partial_vmcnt_race"
            "RaceTest\.multiple_race"
            "RaceTest\.multi_kernel"
            "RaceTest\.multi_kernel_race"
            "RaceTest\.multi_workgroup"
            "RaceTest\.multi_workgroup_race"
            "RaceTest\.mixed_counters_race"
            "RaceTest\.stress_wavefront_reuse"
            "RaceTest\.stress_wavefront_reuse_race"
            "RaceTest\.exec_mask"
            "RaceTest\.exec_mask_race"
            "RaceTest\.exec_mask_same_wave"
            "RaceTest\.exec_mask_cross_wave_race"
            "RaceTest\.exec_mask_cross_wave"
            "RaceTest\.lds_transpose"
            "RaceTest\.lds_transpose_race"
            "RaceTest\.dual_offset_lds"
            "RaceTest\.dual_offset_lds_race"
            "RaceTest\.scratch_vmcnt"
            "RaceTest\.scratch_vmcnt_race"
            "RaceTest\.f64_vgpr_safe"
            "RaceTest\.f64_vgpr_race"
          )

          CMAKE_CONFIG_FLAGS=()
          if [[ "${{ matrix.enable_asan }}" == "1" && "${{ matrix.enable_ubsan }}" == "1" ]]; then
            EXCLUDED_TESTS="${EXCLUDED_TESTS}|$(IFS='|'; echo "${ASAN_UBSAN_EXCLUDED_TESTS[*]}")"
            CMAKE_CONFIG_FLAGS+=(
              -DCMAKE_C_FLAGS_RELWITHDEBINFO="-O2 -g"
              -DCMAKE_CXX_FLAGS_RELWITHDEBINFO="-O2 -g"
            )
          fi
          if [[ -n "${{ matrix.c_compiler }}" ]]; then
            CMAKE_CONFIG_FLAGS+=(-DCMAKE_C_COMPILER="${{ matrix.c_compiler }}")
          fi
          if [[ -n "${{ matrix.cxx_compiler }}" ]]; then
            CMAKE_CONFIG_FLAGS+=(-DCMAKE_CXX_COMPILER="${{ matrix.cxx_compiler }}")
          fi

          CXXFLAGS=""
          if [[ -z "${{ matrix.cxx_compiler }}" || "${{ matrix.cxx_compiler }}" == *clang* ]]; then
            CXXFLAGS="-Wno-error=unknown-warning-option -Wno-error=nested-anon-types"
          fi
          ROCM_PATH=`rocm-sdk path --root` \
            cmake -B "${ROCJITSU_BUILD_DIR}" -G Ninja \
            -DCMAKE_BUILD_TYPE="${{ matrix.build_type }}" \
            -DCMAKE_C_FLAGS="${CFLAGS:-}" \
            -DCMAKE_CXX_FLAGS="${CXXFLAGS:-}" \
            "${CMAKE_CONFIG_FLAGS[@]}" \
            -DRJ_ENABLE_ASAN=${{ matrix.enable_asan }} \
            -DRJ_ENABLE_UBSAN=${{ matrix.enable_ubsan }} \
            -DRJ_ENABLE_TSAN=${{ matrix.enable_tsan }} \
            -DRJ_ENABLE_MSAN=${{ matrix.enable_msan }}

          cmake --build "${ROCJITSU_BUILD_DIR}"

          ctest --test-dir "${ROCJITSU_BUILD_DIR}" \
            -E "${EXCLUDED_TESTS}" \
            --output-on-failure

          echo "${ROCJITSU_BUILD_DIR}/tools/rocjitsu" >> "${GITHUB_PATH}"
          echo "CXXFLAGS=" >> "${GITHUB_ENV}"

      - name: Install corpus test dependencies
        if: matrix.name == 'release'
        working-directory: ${{ env.ROCJITSU_CORPUS_DIR }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run amdisa tests
        if: matrix.name == 'release'
        working-directory: ${{ env.ROCJITSU_SOURCE_DIR }}
        run: |
          cd lib/python && pip install -e . && pytest amdisa/tests

      - name: Run corpus tests
        if: matrix.name == 'release'
        working-directory: ${{ env.ROCJITSU_CORPUS_DIR }}
        shell: bash
        env:
          ROCJITSU_ROOT: ${{ env.ROCJITSU_SOURCE_DIR }}
          ROCJITSU_BUILD: ${{ env.ROCJITSU_BUILD_DIR }}
        run: |
          targets=(
            "gfx942 gfx942_cdna3.json iree_gfx942_hip.json"
            "gfx950 gfx950_cdna4.json iree_gfx950_hip.json"
            "gfx1100 gfx1100_w7900.json iree_gfx1100_hip.json"
            "gfx1201 gfx1201_r9700.json iree_gfx1201_hip.json"
            "gfx1250 gfx1250.json iree_gfx1250_hip.json"
          )

          for target in "${targets[@]}"; do
            read -r name rocjitsu_config corpus_config <<< "${target}"
            echo "::group::pytest (${name})"
            rocjitsu \
              --config "${ROCJITSU_SOURCE_DIR}/configs/${rocjitsu_config}" \
              -- pytest \
              --config-files="${ROCJITSU_SOURCE_DIR}/tests/corpus/${corpus_config}" \
              --timeout 15 \
              corpus/iree/
            echo "::endgroup::"
          done

          targets=(
            "gfx942 gfx942_cdna3_kmd.json external_kernel_gfx942.json 15"
            "gfx950 gfx950_cdna4_kmd.json external_kernel_gfx950.json 15"
            "gfx1201 gfx1201_r9700.json external_kernel_gfx1201.json 60"
          )
          for target in "${targets[@]}"; do
            read -r name rocjitsu_config corpus_config timeout <<< "${target}"
            echo "::group::pytest (${name})"
            ROCM_PATH=`rocm-sdk path --root` \
              rocjitsu \
              --config "${ROCJITSU_SOURCE_DIR}/configs/${rocjitsu_config}" \
              -- pytest \
              --fuzz-target-config-files="${ROCJITSU_SOURCE_DIR}/tests/corpus/${corpus_config}" \
              --timeout "${timeout}" \
              tests/test_fuzz_targets.py
            echo "::endgroup::"
          done

          targets=(
            # CDNA3 FPSAN has no passing tests yet.
            # "gfx942 gfx942_cdna3.json fpsan_gfx942.json"
            "gfx950 gfx950_cdna4.json fpsan_gfx950.json"
            "gfx1100 gfx1100_w7900.json fpsan_gfx1100.json"
            "gfx1201 gfx1201_r9700.json fpsan_gfx1201.json"
            "gfx1250 gfx1250.json fpsan_gfx1250.json"
          )
          fpsan_status=0
          for target in "${targets[@]}"; do
            read -r name rocjitsu_config fpsan_config <<< "${target}"
            echo "::group::fpsan ctest (${name})"
            ROCM_PATH=`rocm-sdk path --root` \
              rocjitsu \
              --config "${ROCJITSU_SOURCE_DIR}/configs/${rocjitsu_config}" \
              -- \
              tests/run_fpsan_ctest.sh \
              --config "${ROCJITSU_SOURCE_DIR}/tests/corpus/${fpsan_config}" \
              --timeout 15 || fpsan_status=$?
            echo "::endgroup::"
          done
          exit "${fpsan_status}"
