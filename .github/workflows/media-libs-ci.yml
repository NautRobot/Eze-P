# This Media Library CI pipeline is separate from TheRock CI for extended customer test cases
name: Media Libs CI

on:
  push:
    branches: [develop]
    paths:
      - 'projects/rocdecode/**'
      - 'projects/rocjpeg/**'
      - '.github/workflows/media-libs-ci.yml'
      - '.github/workflows/therock-media-test-packages.yml'
      - '!**/*.md'
      - '!**/*.rst'
      - '!**/*.rtf'
      - '!**/docs/**'
      - '!**/.readthedocs.yaml'
  pull_request:
    paths:
      - 'projects/rocdecode/**'
      - 'projects/rocjpeg/**'
      - '.github/workflows/media-libs-ci.yml'
      - '.github/workflows/therock-media-test-packages.yml'
      - '!**/*.md'
      - '!**/*.rst'
      - '!**/*.rtf'
      - '!**/docs/**'
      - '!**/.readthedocs.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  setup:
    name: "Setup"
    runs-on: ubuntu-24.04
    outputs:
      package_version: ${{ steps.rocm_package_version.outputs.rocm_package_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: .github
          sparse-checkout-cone-mode: true
          fetch-depth: 2

      - name: Checkout TheRock repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: "ROCm/TheRock"
          path: TheRock
          ref: 685f8c3b89006309b34a7c16de17e841400f0d76 # 2025-05-29 commit

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pydantic requests

      - name: Compute package version
        id: rocm_package_version
        run: |
          python TheRock/build_tools/compute_rocm_package_version.py --release-type=dev

  therock-ci-linux:
    name: Build Media Libs
    needs: setup
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/therock-ci-linux.yml
    secrets: inherit
    with:
      package_version: ${{ needs.setup.outputs.package_version }}
      cmake_options: >
        -DTHEROCK_ENABLE_CORE=ON
        -DTHEROCK_ENABLE_COMM_LIBS=OFF
        -DTHEROCK_ENABLE_DEBUG_TOOLS=OFF
        -DTHEROCK_ENABLE_MATH_LIBS=OFF
        -DTHEROCK_ENABLE_ML_LIBS=OFF
        -DTHEROCK_ENABLE_SYSDEPS_EXPAT=OFF
        -DTHEROCK_ENABLE_SYSDEPS_GMP=OFF
        -DTHEROCK_ENABLE_SYSDEPS_MPFR=OFF
        -DTHEROCK_ENABLE_SYSDEPS_NCURSES=OFF
        -DTHEROCK_ENABLE_SYSDEPS_LIBPCIACCESS=OFF
        -DTHEROCK_ENABLE_SYSDEPS_HWLOC=OFF
        -DTHEROCK_ENABLE_HIPIFY=OFF
        -DTHEROCK_ENABLE_FLATBUFFERS=OFF
        -DTHEROCK_ENABLE_FMT=OFF
        -DTHEROCK_ENABLE_NLOHMANN_JSON=OFF
        -DTHEROCK_ENABLE_SPDLOG=OFF
        -DTHEROCK_ENABLE_OPENMPI=OFF
        -DTHEROCK_ENABLE_CORE_HIPTESTS=OFF
        -DTHEROCK_ENABLE_OCL_RUNTIME=OFF
        -DTHEROCK_ENABLE_CORE_RUNTIME_TESTS=OFF
        -DTHEROCK_ENABLE_RDC=OFF
        -DTHEROCK_ENABLE_SPDLOG=OFF
        -DTHEROCK_ENABLE_AQLPROFILE=OFF
        -DTHEROCK_ENABLE_ROCPROFV3=OFF
        -DTHEROCK_ENABLE_ROCPROFILER_COMPUTE=OFF
        -DTHEROCK_ENABLE_ROCPROF_TRACE_DECODER_BINARY=OFF
        -DTHEROCK_ENABLE_SYSDEPS_AMD_MESA=ON
        -DTHEROCK_ENABLE_ROCDECODE=ON
        -DTHEROCK_ENABLE_ROCJPEG=ON
      projects_to_test: ""
      test_runs_on: ""

  therock-test-linux:
    name: "Test Media Libs"
    needs: [therock-ci-linux]
    uses: ./.github/workflows/therock-media-test-packages.yml
    with:
      amdgpu_families: "gfx94X-dcgpu"
      test_runs_on: "linux-gfx942-1gpu-ossci-rocm"
      platform: "linux"
