name: LSTT Formatting

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/lstt-formatting.yml"
      - "projects/rdc/**"
      - "projects/amdsmi/**"
      - "projects/rocm-smi-lib/**"
      - "!**/*.md"
      - "!**/*.rtf"
      - "!**/*.rst"
      - "!**/.readthedocs.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [rdc, amdsmi, rocm-smi-lib]

    name: ${{ matrix.project }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: projects/${{ matrix.project }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit
        working-directory: projects/${{ matrix.project }}
        run: >
          pre-commit run
          --show-diff-on-failure
          --from-ref origin/${{ github.event.pull_request.base.ref || 'develop' }}
          --to-ref HEAD
