name: rocprofiler-systems RedHat Linux (GCC, Python, ROCm)
run-name: redhat

on:
  push:
    branches:
      - develop
    paths:
      - '.github/workflows/rocprofiler-systems-redhat.yml'
      - 'projects/rocprofiler-systems/**'
      - '!**/*.md'
      - '!**/*.rtf'
      - '!**/*.rst'
      - '!**/.markdownlint-ci2.yaml'
      - '!**/.readthedocs.yaml'
      - '!**/.spellcheck.local.yaml'
      - '!**/.wordlist.txt'
      - '!projects/rocprofiler-systems/docs/**'
      - '!projects/rocprofiler-systems/source/docs/**'
      - '!projects/rocprofiler-systems/source/python/gui/**'
      - '!projects/rocprofiler-systems/docker/**'
      - '!projects/rocprofiler-systems/CMakePresets.json'
  pull_request:
    paths:
      - '.github/workflows/rocprofiler-systems-redhat.yml'
      - 'projects/rocprofiler-systems/**'
      - '!**/*.md'
      - '!**/*.rtf'
      - '!**/*.rst'
      - '!**/.markdownlint-ci2.yaml'
      - '!**/.readthedocs.yaml'
      - '!**/.spellcheck.local.yaml'
      - '!**/.wordlist.txt'
      - '!projects/rocprofiler-systems/docs/**'
      - '!projects/rocprofiler-systems/source/docs/**'
      - '!projects/rocprofiler-systems/source/python/gui/**'
      - '!projects/rocprofiler-systems/docker/**'
      - '!projects/rocprofiler-systems/CMakePresets.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ROCPROFSYS_CI: ON
  ROCPROFSYS_TMPDIR: "%env{PWD}%/testing-tmp"
  ROCPROFSYS_MAX_THREADS: '64'
  OMPI_ALLOW_RUN_AS_ROOT: 1
  OMPI_ALLOW_RUN_AS_ROOT_CONFIRM: 1
  ROCPROFSYS_KEEP_TEST_OUTPUT: '0'
  CCACHE_DIR: ${{ github.workspace }}/.ccache

jobs:
  rhel:
    runs-on: ubuntu-latest
    container:
      image: dgaliffiamd/rocprofiler-systems:ci-rocm-${{ matrix.rocm-version }}-rhel-${{ matrix.os-release }}
      options: --shm-size=512m

    strategy:
      fail-fast: false
      matrix:
        compiler: ['g++']
        os-release: [ '8.10', '9', '10' ]
        rocm-version: [ '6.3', '6.4', '7.0', '7.1', '7.2' ]
        build-type: ['Release']
        exclude:
          - os-release: '10'
            rocm-version: '6.3'
          - os-release: '10'
            rocm-version: '6.4'
          - os-release: '10'
            rocm-version: '7.0'

    steps:
    - uses: actions/checkout@v6
      with:
        sparse-checkout: |
          projects/rocprofiler-systems/
          .gitmodules

    - name: Configure Env
      shell: bash
      working-directory: projects/rocprofiler-systems/
      run:
        echo "CC=$(echo '${{ matrix.compiler }}' | sed 's/+/c/g')" >> $GITHUB_ENV &&
        echo "CXX=${{ matrix.compiler }}" >> $GITHUB_ENV &&
        echo "OS_VERSION_MAJOR=$(cat /etc/os-release | grep 'VERSION_ID' | sed 's/=/ /1' | awk '{print $NF}' | sed 's/"//g' | sed 's/\./ /g' | awk '{print $1}')" >> $GITHUB_ENV &&
        echo "/opt/rocm/bin" >> $GITHUB_PATH &&
        echo "ROCM_PATH=/opt/rocm" >> $GITHUB_ENV &&
        echo "LD_LIBRARY_PATH=/opt/rocm/lib:${LD_LIBRARY_PATH}" >> $GITHUB_ENV &&
        env

    - name: Install Packages
      shell: bash
      working-directory: projects/rocprofiler-systems/
      run: |
          if [ $OS_VERSION_MAJOR -eq 8 ]; then
            wget https://commondatastorage.googleapis.com/perfetto-luci-artifacts/v47.0/linux-amd64/trace_processor_shell -P /opt/trace_processor/bin &&
            chmod +x /opt/trace_processor/bin/trace_processor_shell
            # Set env var so validate_perfetto_trace() uses the downloaded binary
            echo "ROCPROFSYS_TRACE_PROC_SHELL=/opt/trace_processor/bin/trace_processor_shell" >> $GITHUB_ENV
          fi
          if [ $OS_VERSION_MAJOR -eq 10 ]; then
            # TODO: Move package install to the docker.
            dnf install -y --enablerepo=crb mpich mpich-devel
            echo "/usr/lib64/mpich/bin" >> $GITHUB_PATH
          fi

    - name: Restore ccache
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/.ccache
        key: ccache-redhat-${{ github.job }}-${{ matrix.os-release }}-${{ matrix.compiler }}-${{ matrix.rocm-version }}-${{ matrix.build-type }}-${{ github.sha }}
        restore-keys: |
          ccache-redhat-${{ github.job }}-${{ matrix.os-release }}-${{ matrix.compiler }}-${{ matrix.rocm-version }}-${{ matrix.build-type }}-
          ccache-redhat-${{ github.job }}-${{ matrix.os-release }}-${{ matrix.compiler }}-${{ matrix.rocm-version }}-

    - name: Configure ccache
      run: |
        mkdir -p "${CCACHE_DIR}"
        ccache --max-size=1G
        ccache --set-config=sloppiness=time_macros,include_file_mtime,include_file_ctime,pch_defines
        ccache -z
        ccache -p | head -20

    - name: Configure, Build, and Test
      timeout-minutes: 115
      shell: bash
      working-directory: projects/rocprofiler-systems/
      env:
        CMAKE_C_COMPILER_LAUNCHER: ccache
        CMAKE_CXX_COMPILER_LAUNCHER: ccache
      run:
        git config --global --add safe.directory ${GITHUB_WORKSPACE} &&
        git config --global --add safe.directory ${PWD} &&
        cmake --version &&
        TAG="${{ github.repository_owner }}-${{ github.ref_name }}-rhel-${{ matrix.os-release }}-${{ matrix.compiler }}-python-mpip-rocm-${{ matrix.rocm-version }}" &&
        python3 ./scripts/run-ci.py -B build
          --name ${TAG}
          --build-jobs $(nproc)
          --site GitHub
          --
          -DCMAKE_C_COMPILER=$(echo '${{ matrix.compiler }}' | sed 's/+/c/g')
          -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build-type }}
          -DCMAKE_INSTALL_PREFIX=/opt/rocprofiler-systems
          -DROCPROFSYS_BUILD_TESTING=ON
          -DROCPROFSYS_USE_MPI=OFF
          -DROCPROFSYS_USE_OMPT=OFF
          -DROCPROFSYS_USE_PYTHON=ON
          -DROCPROFSYS_BUILD_DYNINST=ON
          -DROCPROFSYS_BUILD_BOOST=ON
          -DROCPROFSYS_BUILD_TBB=ON
          -DROCPROFSYS_BUILD_ELFUTILS=ON
          -DROCPROFSYS_BUILD_LIBIBERTY=ON
          -DROCPROFSYS_CI_MPI_RUN_AS_ROOT=ON
          -DROCPROFSYS_MAX_THREADS=64
          -DROCPROFSYS_INSTALL_PERFETTO_TOOLS=OFF
          -DROCPROFSYS_PYTHON_PREFIX=/opt/conda/envs
          -DROCPROFSYS_PYTHON_ENVS="py3.8;py3.9;py3.10;py3.11"
          -DROCPROFSYS_DISABLE_EXAMPLES="transpose;rccl;openmp-target;openmp-vv-offload"
          -DROCPROFSYS_BUILD_NUMBER=${{ github.run_attempt }}
          --
          -LE "network|gpu"

    - name: ccache stats
      if: always()
      run: |
        echo "=== ccache stats ==="
        ccache -s -v || true
        echo "=== ccache dir size ==="
        du -sh "${CCACHE_DIR}" || true

    - name: Check for Leftover Buffered Files
      timeout-minutes: 5
      working-directory: projects/rocprofiler-systems/
      run: |
        set -v
        if find /tmp -maxdepth 1 -name 'buffered*' -print -quit | grep -q .; then
          echo "Error: Found leftover buffered storage files in /tmp:"
          ls -lh /tmp/buffered*
          exit 1
        else
          echo "✓ No buffered storage files found in /tmp"
        fi


    - name: Install
      timeout-minutes: 10
      working-directory: projects/rocprofiler-systems/
      run:
        cmake --build build --target install --parallel $(nproc)

    - name: Test Install
      timeout-minutes: 10
      shell: bash
      working-directory: projects/rocprofiler-systems/
      run: |
        set -v
        source /opt/rocprofiler-systems/share/rocprofiler-systems/setup-env.sh
        # System python on RHEL 8 is 3.6, which does not work with test suite
        export PYTHON_EXECUTABLE=/opt/conda/envs/py3.8/bin/python
        export PATH=/opt/conda/envs/py3.8/bin:${PATH}
        ./scripts/test-install.sh --test-rocprof-sys-{instrument,avail,sample,rewrite,runtime,python}=1

    - name: Test User API
      timeout-minutes: 10
      working-directory: projects/rocprofiler-systems/
      run: |
        set -v
        ./scripts/test-find-package.sh --install-dir /opt/rocprofiler-systems

    - name: CTest Artifacts
      if: failure()
      continue-on-error: True
      uses: actions/upload-artifact@v7
      with:
        name: ctest-${{ github.job }}-${{ strategy.job-index }}-log
        path: |
          projects/rocprofiler-systems/build/*.log

    - name: Data Artifacts
      if: failure()
      continue-on-error: True
      uses: actions/upload-artifact@v7
      with:
        name: data-${{ github.job }}-${{ strategy.job-index }}-files
        path: |
          projects/rocprofiler-systems/build/rocprofsys-tests-config/*.cfg
          projects/rocprofiler-systems/build/rocprofsys-tests-output/**/*.txt
          projects/rocprofiler-systems/build/rocprofsys-tests-output/**/*-instr*.json

    - name: Kill Perfetto
      if: success() || failure()
      continue-on-error: True
      working-directory: projects/rocprofiler-systems/
      run: |
        set +e
        RUNNING_PROCS=$(pgrep trace_processor_shell)
        if [ -n "${RUNNING_PROCS}" ]; then kill -s 9 ${RUNNING_PROCS}; fi
