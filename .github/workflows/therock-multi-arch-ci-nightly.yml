# Nightly trigger for Multi-Arch CI
#
# How nightly builds work:
# 1. This workflow runs on a schedule (cron) at 7 AM UTC daily
# 2. It triggers therock-multi-arch-ci.yml via workflow_dispatch with specific inputs
# 3. The inputs specify which GPU families to build/test and the test type
#
# Why workflow_dispatch instead of direct schedule on therock-multi-arch-ci.yml?
# TheRock's setup_multi_arch workflow ignores family inputs when triggered by
# schedule and runs ALL families. By using workflow_dispatch, TheRock respects
# our specified families (gfx94X, gfx950, gfx125X for Linux, gfx1151 for Windows).
#
# Test type: comprehensive (via test_filter:comprehensive label)

name: TheRock Multi-Arch CI Nightly Trigger

on:
  schedule:
    - cron: "0 7 * * *" # Runs nightly at 7 AM UTC

permissions:
  actions: write
  contents: read

jobs:
  multi-arch-ci-nightly-trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Multi-Arch CI with specific GPU families
        uses: benc-uk/workflow-dispatch@31e2b3319479a63f0ab15bf800eff9e913504e26 # v1.3.2
        with:
          workflow: therock-multi-arch-ci.yml
          ref: develop
          inputs: '{ "linux_amdgpu_families": "gfx94X,gfx950,gfx125X", "windows_amdgpu_families": "gfx1151", "linux_test_labels": "test_filter:comprehensive", "windows_test_labels": "test_filter:comprehensive" }'
